<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Inbox — Pencev Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F4F5F7;
  --surface: #FFFFFF;
  --surface-2: #F4F6F9;
  --surface-3: #EDF1F7;
  --border: #E8ECF2;
  --border-hover: #D1D9E6;
  --text: #0A1327;
  --text-muted: #8F9BB3;
  --text-dim: #C4CDDF;
  --accent: #0A1327;
  --accent-glow: rgba(10,19,39,0.06);
  --green: #2ec98e;
  --amber: #f0a020;
  --red: #e55a48;
  --purple: #9b6cf7;
  --header-h: 64px;
  --hero-h: 100px;
  --filter-h: 56px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.header-left { display: flex; align-items: center; }
.monogram {
  width: 38px; height: 38px; border-radius: 50%;
  background: #0A1327;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff;
  letter-spacing: -0.5px; flex-shrink: 0;
}
.header-title-group { margin-left: 12px; }
.header-title { font-size: 15px; font-weight: 700; color: #0A1327; letter-spacing: -0.3px; line-height: 1.2; }
.header-subtitle { font-size: 11px; color: #8F9BB3; font-weight: 500; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-search {
  display: flex; align-items: center; gap: 8px;
  background: #F4F6F9; border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 14px;
  min-width: 220px;
}
.header-search input {
  border: none; background: none; outline: none;
  font-size: 13px; color: #0A1327; font-family: inherit; width: 100%;
}
.header-search input::placeholder { color: #8F9BB3; }
.notif-btn {
  position: relative;
  width: 38px; height: 38px; border-radius: 10px;
  background: #F4F6F9; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: #8F9BB3; cursor: pointer; transition: all 150ms;
}
.notif-btn:hover { border-color: var(--border-hover); color: #0A1327; }
.notif-count {
  position: absolute; top: -4px; right: -4px;
  min-width: 16px; height: 16px; border-radius: 8px;
  background: var(--red); color: white;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px; border: 2px solid white;
}

/* ── Hero ── */
.hero {
  position: fixed;
  top: var(--header-h); left: 0; right: 0;
  height: var(--hero-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 99;
}
.hero-left { display: flex; align-items: center; gap: 18px; }
.hero-date {
  display: flex; flex-direction: column; align-items: center;
  background: #FFFFFF; border: 1px solid var(--border);
  border-radius: 14px; padding: 8px 14px; min-width: 54px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); flex-shrink: 0;
}
.hero-date-num { font-size: 26px; font-weight: 800; color: #0A1327; line-height: 1; }
.hero-date-mon { font-size: 10px; font-weight: 700; color: #8F9BB3; letter-spacing: 0.8px; margin-top: 2px; }
.hero-text { display: flex; flex-direction: column; gap: 2px; }
.hero-greeting { font-size: 22px; font-weight: 800; color: #0A1327; letter-spacing: -0.5px; line-height: 1.2; }
.hero-sub { font-size: 14px; color: #8F9BB3; font-weight: 500; }
.hero-welcome { font-size: 12px; margin-top: 3px; }
.hero-welcome-name { font-weight: 700; color: #0A1327; }
.hero-welcome-sub { color: #8F9BB3; font-weight: 400; }
.hero-right { display: flex; align-items: center; }
.view-toggle {
  display: flex; background: #FFFFFF; border-radius: 100px;
  border: 1px solid var(--border); padding: 3px; gap: 2px;
}
.view-btn {
  padding: 7px 20px; font-size: 13px; font-weight: 600;
  background: none; border: none; color: #8F9BB3;
  cursor: pointer; transition: all 150ms;
  font-family: inherit; border-radius: 100px;
}
.view-btn:hover { color: #0A1327; }
.view-btn.active { background: #0A1327; color: #FFFFFF; }

/* ── Filter Bar ── */
.filter-bar {
  position: fixed;
  top: calc(var(--header-h) + var(--hero-h));
  left: 0; right: 0;
  height: var(--filter-h);
  display: flex; align-items: center; gap: 8px;
  padding: 0 28px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 98;
  overflow-x: auto;
  flex-wrap: nowrap;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-search {
  display: flex; align-items: center; gap: 6px;
  background: #F4F6F9; border: 1px solid var(--border);
  border-radius: 100px; padding: 6px 14px; flex-shrink: 0;
}
.filter-search input {
  border: none; background: none; outline: none;
  font-size: 12px; color: #0A1327; font-family: inherit; width: 110px;
}
.filter-search input::placeholder { color: #8F9BB3; }
.filter-sep {
  width: 1px; height: 24px; background: var(--border);
  flex-shrink: 0; margin: 0 4px;
}
.chip {
  padding: 5px 14px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  background: #FFFFFF; border: 1px solid var(--border);
  color: #8F9BB3; cursor: pointer;
  transition: all 150ms; white-space: nowrap;
  font-family: inherit; flex-shrink: 0;
}
.chip:hover { border-color: var(--border-hover); color: #0A1327; }
.chip.active { background: #0A1327; border-color: #0A1327; color: #FFFFFF; }
.filter-total {
  font-size: 12px; font-weight: 600; color: #0A1327;
  background: #FFFFFF; border: 1px solid var(--border);
  border-radius: 100px; padding: 5px 14px;
  white-space: nowrap; flex-shrink: 0; margin-left: auto;
}

/* ── Main Content ── */
.main {
  position: fixed;
  top: calc(var(--header-h) + var(--hero-h));
  left: 0; right: 0; bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 24px 28px 40px;
  transition: top 150ms;
}
.main.with-filter {
  top: calc(var(--header-h) + var(--hero-h) + var(--filter-h));
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 3px; }
.main::-webkit-scrollbar-thumb:hover { background: #D1D9E6; }

/* ── Kanban ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  min-height: 100%;
}
.kanban-col { display: flex; flex-direction: column; gap: 8px; }
.col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.col-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #8F9BB3; }
.col-count {
  font-size: 11px; font-weight: 600;
  background: #FFFFFF; color: #0A1327;
  border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 100px;
}

/* ── Cards ── */
.card {
  background: #FFFFFF;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 150ms;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  transform: translateY(-1px);
}
.card.nfa-card { opacity: 0.45; }
.card.nfa-card:hover { opacity: 0.75; }

.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.badge {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px;
}
.badge-maintenance { background: rgba(240,160,32,0.12); color: #f0a020; }
.badge-remittance { background: rgba(46,201,142,0.12); color: #2ec98e; }
.badge-lease { background: rgba(155,108,247,0.12); color: #9b6cf7; }
.badge-other { background: #F4F6F9; color: #8F9BB3; }
.badge-urgency-high { background: rgba(229,90,72,0.1); color: #e55a48; }
.badge-urgency-medium { background: rgba(240,160,32,0.1); color: #f0a020; }
.badge-urgency-low { background: #F4F6F9; color: #8F9BB3; }

.card-subject {
  font-size: 13px; font-weight: 500; color: #0A1327;
  line-height: 1.4; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  font-size: 11px; color: #8F9BB3;
  display: flex; align-items: center; gap: 8px;
}
.card-property { color: #8F9BB3; font-weight: 500; }
.card-date { color: #C4CDDF; }

/* ── Group (thread) ── */
.group-wrapper { display: flex; flex-direction: column; gap: 0; }
.group-toggle {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #C4CDDF; cursor: pointer;
  padding: 4px 8px; background: none; border: none;
  font-family: inherit; transition: color 150ms;
}
.group-toggle:hover { color: #8F9BB3; }
.group-toggle svg { transition: transform 150ms; }
.group-toggle.expanded svg { transform: rotate(90deg); }
.group-children {
  display: none; flex-direction: column; gap: 6px;
  padding-left: 12px; margin-top: 6px;
  border-left: 2px solid #EDF1F7;
}
.group-children.open { display: flex; }

/* ── Property Grid ── */
.property-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.property-card {
  background: #FFFFFF;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 22px 20px;
  transition: all 150ms;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.property-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}
.prop-name { font-size: 15px; font-weight: 700; color: #0A1327; margin-bottom: 3px; }
.prop-address { font-size: 12px; color: #8F9BB3; }

/* ── Lease section pills ── */
.lease-expiry-pill {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
  line-height: 1.4; vertical-align: middle; margin-left: 4px;
}
.lease-expiry-red { background: rgba(229,90,72,0.15); color: var(--red); }
.lease-expiry-amber { background: rgba(240,160,32,0.15); color: var(--amber); }
.lease-expiry-green { background: rgba(46,201,142,0.15); color: var(--green); }
.lease-expiry-expired { background: rgba(229,90,72,0.25); color: var(--red); }

/* ── Detail Panel ── */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
.backdrop.open { opacity: 1; pointer-events: all; }

.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 420px; max-width: 100vw;
  background: #FFFFFF;
  border-left: 1px solid var(--border);
  z-index: 201;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 250ms cubic-bezier(0.16, 1, 0.3, 1);
}
.detail-panel.open { transform: translateX(0); }

.detail-scroll {
  flex: 1; overflow-y: auto; padding: 28px 24px 24px;
}
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-track { background: transparent; }
.detail-scroll::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 2px; }
.detail-scroll::-webkit-scrollbar-thumb:hover { background: #D1D9E6; }

.detail-close {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px;
  background: #F4F6F9; border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #8F9BB3; transition: all 150ms; z-index: 5;
}
.detail-close:hover { background: #EDF1F7; color: #0A1327; }

.detail-review-banner {
  background: rgba(240,160,32,0.08);
  border: 1px solid rgba(240,160,32,0.25);
  border-radius: 6px; padding: 10px 14px;
  font-size: 12px; color: #f0a020; margin-bottom: 16px; line-height: 1.4;
}
.detail-property { font-size: 18px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.3px; color: #0A1327; }
.detail-address { font-size: 13px; color: #8F9BB3; margin-bottom: 16px; }
.detail-badges { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.detail-subject { font-size: 14px; font-weight: 600; margin-bottom: 12px; line-height: 1.4; color: #0A1327; }
.detail-row { font-size: 12px; color: #8F9BB3; margin-bottom: 6px; }
.detail-row strong { color: #0A1327; font-weight: 500; }
.detail-body {
  margin-top: 16px; padding: 16px;
  background: #F8F9FB; border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.6; color: #8F9BB3;
  white-space: pre-wrap; word-break: break-word;
  max-height: 320px; overflow-y: auto;
}
.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-track { background: transparent; }
.detail-body::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 2px; }
.detail-body::-webkit-scrollbar-thumb:hover { background: #D1D9E6; }
.detail-attachments { margin-top: 16px; }
.detail-att-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
.detail-att-item { font-size: 12px; color: var(--text-dim); padding: 6px 0; border-bottom: 1px solid var(--border); }

.detail-actions {
  padding: 16px 24px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; background: #FFFFFF;
}
.action-btn {
  flex: 1; padding: 10px 0;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 150ms;
  background: #F4F6F9; color: #8F9BB3;
}
.action-btn:hover { border-color: var(--border-hover); color: #0A1327; }
.action-btn-nfa { color: #C4CDDF; }
.action-btn-nfa:hover { color: #8F9BB3; border-color: #C4CDDF; }
.action-btn-progress { border-color: rgba(10,19,39,0.2); color: #0A1327; }
.action-btn-progress:hover { background: rgba(10,19,39,0.06); border-color: #0A1327; }
.action-btn-done { border-color: rgba(46,201,142,0.3); color: #2ec98e; }
.action-btn-done:hover { background: rgba(46,201,142,0.08); border-color: #2ec98e; }

/* ── Property Detail Panel ── */
.prop-detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 700px; max-width: 100vw;
  background: var(--bg);
  border-left: 1px solid var(--border);
  z-index: 300;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
  overflow: hidden;
}
.prop-detail-panel.open { transform: translateX(0); }
.pds-scroll {
  flex: 1; overflow-y: auto; padding-bottom: 40px;
}
.pds-scroll::-webkit-scrollbar { width: 4px; }
.pds-scroll::-webkit-scrollbar-track { background: transparent; }
.pds-scroll::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 2px; }
.pds-header {
  background: #0A1327;
  padding: 24px 24px 22px;
  position: relative;
}
.pds-close {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.7); cursor: pointer; transition: all 150ms;
}
.pds-close:hover { background: rgba(255,255,255,0.18); color: #fff; }
.pds-card {
  background: #FFFFFF;
  border: 1px solid var(--border);
  border-radius: 16px;
  margin: 14px 16px 0;
  padding: 18px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.pds-section-title {
  font-size: 10px; font-weight: 700; color: #8F9BB3;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 14px;
}
.pds-stat-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px;
  margin: 14px 16px 0;
}
.pds-stat-card {
  background: #FFFFFF; border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.pds-stat-label { font-size: 10px; font-weight: 600; color: #8F9BB3; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.pds-stat-value { font-size: 18px; font-weight: 800; color: #0A1327; letter-spacing: -0.5px; line-height: 1.1; }
.pds-stat-sub { font-size: 10px; color: #C4CDDF; margin-top: 3px; }

/* ── Loading / Empty ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: #8F9BB3; font-size: 13px;
}
.loading-spinner {
  width: 20px; height: 20px; border: 2px solid #EDF1F7;
  border-top-color: #0A1327; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-col { font-size: 12px; color: #C4CDDF; padding: 20px 0; text-align: center; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .kanban-board { display: block !important; }
  .kanban-col { display: none !important; }
  .kanban-col.mobile-active { display: flex !important; flex-direction: column; }
  .mobile-tab-bar { display: flex !important; }
}
.mobile-tab-bar {
  display: none; background: #FFFFFF;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.mobile-tab-bar::-webkit-scrollbar { display: none; }
.mobile-tab {
  padding: 10px 16px; font-size: 13px; font-weight: 500; color: #8F9BB3;
  cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
  background: none; border-top: none; border-left: none; border-right: none;
}
.mobile-tab.active { color: #0A1327; border-bottom-color: #0A1327; }

@media (max-width: 900px) {
  .kanban { grid-template-columns: 1fr; gap: 24px; }
  .detail-panel { width: 100vw; }
  .header-search { min-width: 140px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo" style="font-size:15px;font-weight:700;color:#0A1327;letter-spacing:-0.3px">Pencev Capital <span style="color:#8F9BB3;font-weight:400">/ Property Inbox</span></div>
  <nav style="display:flex;align-items:center;gap:4px">
    <a href="hub.html" style="padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:#8F9BB3;text-decoration:none;transition:all 0.15s" onmouseover="this.style.background='#fff';this.style.color='#0A1327'" onmouseout="this.style.background='';this.style.color='#8F9BB3'">Hub</a>
    <a href="wealth.html" style="padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:#8F9BB3;text-decoration:none;transition:all 0.15s" onmouseover="this.style.background='#fff';this.style.color='#0A1327'" onmouseout="this.style.background='';this.style.color='#8F9BB3'">Wealth</a>
    <a href="pnl.html" style="padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:#8F9BB3;text-decoration:none;transition:all 0.15s" onmouseover="this.style.background='#fff';this.style.color='#0A1327'" onmouseout="this.style.background='';this.style.color='#8F9BB3'">P&amp;L</a>
    <a href="index.html" style="padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;background:#0A1327;color:#fff;text-decoration:none">Properties</a>
  </nav>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="header-search">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#8F9BB3" stroke-width="1.5"/><path d="M10 10l2.5 2.5" stroke="#8F9BB3" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="header-search-input" placeholder="Search..." />
    </div>
    <button class="notif-btn" id="notif-btn" title="Notifications">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5a4.5 4.5 0 0 1 4.5 4.5v2l1.2 1.8H2.3L3.5 8V6A4.5 4.5 0 0 1 8 1.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6.5 13.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="notif-count" id="notif-count" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- Hero -->
<div class="hero" id="hero">
  <div class="hero-left">
    <div class="hero-date">
      <div class="hero-date-num" id="hero-date-num">—</div>
      <div class="hero-date-mon" id="hero-date-mon">—</div>
    </div>
    <div class="hero-text">
      <div class="hero-greeting" id="hero-greeting">Property Inbox</div>
      <div class="hero-sub" id="hero-sub">Loading…</div>
    </div>
  </div>
  <div class="hero-right">
    <div class="view-toggle">
      <button class="view-btn active" data-view="property">Dashboard</button>
      <button class="view-btn" data-view="kanban">Kanban</button>
    </div>
  </div>
</div>

<!-- Filter Bar -->
<div class="filter-bar" id="filter-bar" style="display:none">
  <div class="filter-search">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#8F9BB3" stroke-width="1.5"/><path d="M10 10l2.5 2.5" stroke="#8F9BB3" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="text" id="filter-search-input" placeholder="Filter inbox..." />
  </div>
  <div class="filter-sep"></div>
  <button class="chip active" data-filter-type="ALL">All</button>
  <button class="chip" data-filter-type="MAINTENANCE">Maintenance</button>
  <button class="chip" data-filter-type="REMITTANCE">Remittance</button>
  <button class="chip" data-filter-type="LEASE">Lease</button>
  <button class="chip" data-filter-type="OTHER">Other</button>
  <div class="filter-total" id="filter-total">0 items total</div>
</div>

<!-- Main -->
<div class="main" id="main">
  <div class="loading"><div class="loading-spinner"></div>Loading queue…</div>
</div>

<!-- Property Detail Panel -->
<div class="prop-detail-panel" id="prop-detail-panel">
  <button class="pds-close" id="prop-detail-close" aria-label="Close">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <div class="pds-scroll" id="prop-detail-content"></div>
</div>

<!-- Detail Panel -->
<div class="backdrop" id="backdrop"></div>
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" id="detail-close" aria-label="Close">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <div class="detail-scroll" id="detail-content"></div>
  <div class="detail-actions" id="detail-actions"></div>
</div>

<script>
(function() {
  'use strict';

  // ── Constants ──
  const DATA_URL = 'https://raw.githubusercontent.com/tankinsurance/property-inbox/main/queue.json';
  const API_URL = 'https://property-inbox-api.marel-e1f.workers.dev';
  const LEASES_URL = 'https://raw.githubusercontent.com/tankinsurance/property-inbox/main/leases.json';
  const PROP_DETAILS_URL = 'https://raw.githubusercontent.com/tankinsurance/property-inbox/main/property-details.json';

  const PROPERTY_MAP = {
    'camillo-wa':        { name: 'Camillo WA',        address: '61 Amanda Drive, Camillo WA' },
    'west-wodonga-vic':  { name: 'West Wodonga VIC',  address: '7 Schultz Ct, West Wodonga VIC' },
    'wilsonton-qld':     { name: 'Wilsonton QLD',     address: '36 Catalina Dr, Wilsonton QLD' },
    'lavington-nsw':     { name: 'Lavington NSW',     address: '379 Prune St, Lavington NSW' },
    'townsville-qld':    { name: 'Kirwan QLD',        address: '13 President St, Kirwan (Townsville) QLD' }
  };

  const PROP_COLORS = {
    'camillo-wa':       '#c9a227',
    'west-wodonga-vic': '#4a7fc1',
    'wilsonton-qld':    '#b05a5a',
    'lavington-nsw':    '#4a9bb0',
    'townsville-qld':   '#b05a5a',
  };

  const COLUMNS = [
    { key: 'PENDING',        label: 'Inbox' },
    { key: 'NEEDS_DECISION', label: 'Needs Decision' },
    { key: 'IN_PROGRESS',    label: 'In Progress' },
    { key: 'DONE',           label: 'Done' }
  ];

  const TYPE_COLORS = {
    MAINTENANCE: 'maintenance',
    REMITTANCE:  'remittance',
    LEASE:       'lease'
  };

  const PROP_ORDER = ['camillo-wa','west-wodonga-vic','wilsonton-qld','lavington-nsw','townsville-qld'];

  // ── State ──
  let items = [];
  let leases = {};
  let propDetails = {};
  let currentView = 'property';
  let filterType = 'ALL';
  let searchQuery = '';
  let openPanelId = null;
  let expandedGroups = {};
  let _statusMap = {};

  // ── Utility ──
  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return dateStr; }
  }

  function formatLeaseDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return dateStr; }
  }

  function daysUntilExpiry(expiryStr) {
    if (!expiryStr) return null;
    const now = new Date(); now.setHours(0,0,0,0);
    const exp = new Date(expiryStr + 'T00:00:00');
    return Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
  }

  function leaseExpiryPill(days) {
    if (days === null) return '';
    if (days < 0) return `<span class="lease-expiry-pill lease-expiry-expired">Expired ${Math.abs(days)}d ago</span>`;
    let cls = 'lease-expiry-green';
    if (days <= 30) cls = 'lease-expiry-red';
    else if (days <= 60) cls = 'lease-expiry-amber';
    return `<span class="lease-expiry-pill ${cls}">${days}d left</span>`;
  }

  function shortPropName(propertyId) {
    const p = PROPERTY_MAP[propertyId];
    return p ? p.name : propertyId;
  }

  function typeClass(type) {
    return TYPE_COLORS[type] || 'other';
  }

  // ── Status (KV) ──
  async function fetchStatusMap() {
    try {
      const res = await fetch(API_URL + '/status');
      if (res.ok) _statusMap = await res.json();
    } catch (e) {
      console.warn('Status API unavailable:', e.message);
    }
  }

  async function setStatus(msgId, status) {
    if (status === 'PENDING') { delete _statusMap[msgId]; }
    else { _statusMap[msgId] = status; }
    try {
      await fetch(API_URL + '/status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msgId, status })
      });
    } catch (e) {
      console.warn('Status save failed:', e.message);
    }
  }

  function resolveStatus(item) {
    if (item.type === 'REMITTANCE') return 'DONE';
    if (_statusMap[item.msgId]) return _statusMap[item.msgId];
    if (item.needsReview) return 'NEEDS_DECISION';
    return 'PENDING';
  }

  function columnForStatus(s) {
    if (s === 'NFA' || s === 'DONE') return 'DONE';
    if (s === 'IN_PROGRESS') return 'IN_PROGRESS';
    if (s === 'NEEDS_DECISION') return 'NEEDS_DECISION';
    return 'PENDING';
  }

  // ── Filtering ──
  function getFilteredItems() {
    return items.filter(it => {
      if (filterType !== 'ALL' && it.type !== filterType) return false;
      if (searchQuery) {
        const q = searchQuery;
        const haystack = ((it.subject||'') + ' ' + (it.propertyId||'') + ' ' + (it.from||'') + ' ' + shortPropName(it.propertyId)).toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });
  }

  // ── Stats / Bell ──
  function renderStats() {
    const visible = getFilteredItems();
    const el = document.getElementById('filter-total');
    if (el) el.textContent = visible.length + ' items total';
    const actionNeeded = items.filter(i => {
      const s = resolveStatus(i);
      return s === 'PENDING' || s === 'NEEDS_DECISION';
    });
    const bell = document.getElementById('notif-count');
    if (bell) {
      bell.textContent = actionNeeded.length;
      bell.style.display = actionNeeded.length > 0 ? 'flex' : 'none';
    }
  }

  // ── Hero date ──
  function renderHeroDate() {
    const now = new Date();
    const dayEl = document.getElementById('hero-date-num');
    const monEl = document.getElementById('hero-date-mon');
    if (dayEl) dayEl.textContent = now.getDate();
    if (monEl) monEl.textContent = now.toLocaleString('en-AU', { month: 'short' }).toUpperCase();
  }

  // ── Card HTML ──
  function cardHTML(item) {
    const st = resolveStatus(item);
    const tc = typeClass(item.type);
    const nfaCls = st === 'NFA' ? ' nfa-card' : '';
    const urgency = item.data && item.data.urgency ? item.data.urgency : '';
    const urgCls = urgency ? ` badge-urgency-${urgency.toLowerCase()}` : '';
    return `<div class="card${nfaCls}" data-id="${esc(item.msgId)}">
      <div class="card-top">
        <span class="badge badge-${tc}">${esc(item.type)}</span>
        ${urgency ? `<span class="badge${urgCls}">${esc(urgency)}</span>` : ''}
      </div>
      <div class="card-subject">${esc(item.subject)}</div>
      <div class="card-meta">
        <span class="card-property">${esc(shortPropName(item.propertyId))}</span>
        <span class="card-date">${esc(formatDate(item.emailDate))}</span>
      </div>
    </div>`;
  }

  // ── Grouping for Kanban ──
  function groupItems(arr) {
    const groups = {}; const order = [];
    arr.forEach(item => {
      const key = item.propertyId + '|' + item.type;
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(item);
    });
    for (const k in groups) {
      groups[k].sort((a, b) => new Date(b.emailDate || b.scannedAt) - new Date(a.emailDate || a.scannedAt));
    }
    return order.map(k => groups[k]);
  }

  function groupHTML(group) {
    if (group.length === 1) return cardHTML(group[0]);
    const gid = group[0].propertyId + '|' + group[0].type;
    const isExpanded = expandedGroups[gid];
    const chevron = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 1l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    let html = `<div class="group-wrapper">`;
    html += cardHTML(group[0]);
    html += `<button class="group-toggle${isExpanded ? ' expanded' : ''}" data-group="${esc(gid)}">${chevron} ${group.length - 1} more ${esc(group[0].type.toLowerCase())} item${group.length - 1 > 1 ? 's' : ''}</button>`;
    html += `<div class="group-children${isExpanded ? ' open' : ''}">`;
    for (let i = 1; i < group.length; i++) html += cardHTML(group[i]);
    html += `</div></div>`;
    return html;
  }

  // ── Kanban View ──
  function renderKanban() {
    const f = getFilteredItems();
    const buckets = { PENDING: [], NEEDS_DECISION: [], IN_PROGRESS: [], DONE: [] };
    f.forEach(item => {
      const col = columnForStatus(resolveStatus(item));
      buckets[col].push(item);
    });
    const mobileActiveCol = window._mobileActiveCol || 'PENDING';
    const tabsHtml = `<div class="mobile-tab-bar">${COLUMNS.map(c=>`<button class="mobile-tab${c.key===mobileActiveCol?' active':''}" data-col="${c.key}">${c.label} <span style="opacity:0.6;font-size:11px">${buckets[c.key].length}</span></button>`).join('')}</div>`;
    let html = tabsHtml + '<div class="kanban kanban-board">';
    COLUMNS.forEach(col => {
      const colItems = buckets[col.key];
      const groups = groupItems(colItems);
      const mobileActive = col.key === mobileActiveCol ? ' mobile-active' : '';
      html += `<div class="kanban-col${mobileActive}">
        <div class="col-header">
          <span class="col-label">${esc(col.label)}</span>
          <span class="col-count">${colItems.length}</span>
        </div>`;
      if (groups.length === 0) { html += `<div class="empty-col">No items</div>`; }
      else { groups.forEach(g => { html += groupHTML(g); }); }
      html += `</div>`;
    });
    html += '</div>';
    return html;
  }

  // ── Lease Expiry Banner (inline, for property view) ──
  function renderLeaseBanner() {
    if (!leases) return '';
    const today = new Date();
    const todayKey = today.toISOString().slice(0,10);
    const dismissed = localStorage.getItem('pc-banner-dismissed') === todayKey;
    if (dismissed) return '';
    const expiring = Object.values(leases)
      .filter(l => l.expiry)
      .map(l => { const days = Math.round((new Date(l.expiry) - today) / 86400000); return { ...l, days }; })
      .filter(l => l.days <= 60 && l.days >= 0)
      .sort((a,b) => a.days - b.days);
    if (!expiring.length) return '';
    const alerts = expiring.map(l => {
      const color = l.days <= 30 ? '#e55a48' : '#f0a020';
      const pending = l.pendingRent ? ` Renewal at $${l.pendingRent}/wk pending.` : '';
      const status = l.actionStatus ? ` ${l.actionStatus}.` : pending;
      return `<span style="color:${color}">⚠️ <strong>${esc(l.name)}</strong> — lease expires in ${l.days} days (${new Date(l.expiry).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}).${status}</span>`;
    }).join('<span style="margin:0 12px;color:var(--border)">|</span>');
    const bgColor = expiring[0].days <= 30 ? 'rgba(229,90,72,0.1)' : 'rgba(240,160,32,0.1)';
    const todayKeyEsc = esc(todayKey);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:13px;font-weight:500;background:${bgColor};border:1px solid rgba(0,0,0,0.08);border-radius:14px;margin-bottom:20px">
      <div style="flex:1">${alerts}</div>
      <button onclick="localStorage.setItem('pc-banner-dismissed','${todayKeyEsc}');this.parentElement.remove()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:0 0 0 16px;flex-shrink:0">×</button>
    </div>`;
  }

  // ── Financial Summary Cards ──
  function renderFinancialSummary() {
    if (!leases || !Object.keys(leases).length) return '';
    const props = Object.values(leases);
    const totalWeekly = props.reduce((s, l) => s + (l.weeklyRent || 0), 0);
    const annual = totalWeekly * 52;
    const occupied = props.filter(l => l.weeklyRent > 0).length;
    const total = props.length;
    const occupancyPct = total > 0 ? Math.round((occupied / total) * 100) : 0;
    const withExpiry = props.filter(l => l.expiry).map(l => ({ ...l, days: Math.round((new Date(l.expiry) - new Date()) / 86400000) })).sort((a,b) => a.days - b.days);
    const soonest = withExpiry[0];
    const expiryDays = soonest ? soonest.days : null;
    const expiryName = soonest ? soonest.name : '—';

    const r = 32; const circ = 2 * Math.PI * r;
    const dash = (occupancyPct / 100) * circ;
    const donut = `<svg width="80" height="80" viewBox="0 0 84 84"><circle cx="42" cy="42" r="${r}" fill="none" stroke="#EDF1F7" stroke-width="8"/><circle cx="42" cy="42" r="${r}" fill="none" stroke="#0A1327" stroke-width="8" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 42 42)"/><text x="42" y="47" text-anchor="middle" font-size="15" font-weight="800" fill="#0A1327" font-family="Inter,-apple-system,sans-serif">${occupancyPct}%</text></svg>`;

    const dotColor = expiryDays !== null && expiryDays <= 30 ? '#e55a48' : expiryDays !== null && expiryDays <= 60 ? '#f0a020' : '#2ec98e';

    return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px">
      <div style="background:#FFFFFF;border:1px solid #E8ECF2;border-radius:20px;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="width:32px;height:32px;background:#F4F6F9;border-radius:8px;display:flex;align-items:center;justify-content:center"><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="1" y="1" width="14" height="10" rx="2" stroke="#8F9BB3" stroke-width="1.5"/><path d="M1 4h14" stroke="#8F9BB3" stroke-width="1.5"/></svg></div>
          <span style="font-size:11px;font-weight:600;color:#8F9BB3">Weekly</span>
        </div>
        <div style="font-size:12px;color:#8F9BB3;margin-bottom:6px">Total weekly rent</div>
        <div style="font-size:26px;font-weight:800;color:#0A1327;letter-spacing:-1px">$${totalWeekly.toLocaleString()}</div>
      </div>
      <div style="background:#FFFFFF;border:1px solid #E8ECF2;border-radius:20px;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="width:32px;height:32px;background:#F4F6F9;border-radius:8px;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#8F9BB3" stroke-width="1.5"/><path d="M8 4.5v3.5l2 2" stroke="#8F9BB3" stroke-width="1.5" stroke-linecap="round"/></svg></div>
          <span style="font-size:11px;font-weight:600;color:#8F9BB3">Annual</span>
        </div>
        <div style="font-size:12px;color:#8F9BB3;margin-bottom:6px">Estimated income</div>
        <div style="font-size:26px;font-weight:800;color:#0A1327;letter-spacing:-1px">$${annual.toLocaleString()}</div>
      </div>
      <div style="background:#FFFFFF;border:1px solid #E8ECF2;border-radius:20px;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        ${donut}
        <div style="font-size:13px;font-weight:700;color:#0A1327">Occupancy</div>
        <div style="font-size:12px;color:#8F9BB3">${occupied}/${total} tenanted</div>
      </div>
      <div style="background:#0A1327;border-radius:20px;padding:22px 24px;box-shadow:0 4px 16px rgba(10,19,39,0.18)">
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.45);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px">Next Expiry</div>
        <div style="font-size:20px;font-weight:800;color:#FFFFFF;letter-spacing:-0.5px;margin-bottom:14px">${esc(expiryName)}</div>
        <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border-radius:100px;padding:5px 12px">
          <div style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
          <span style="font-size:12px;font-weight:600;color:#FFFFFF">${expiryDays !== null ? expiryDays + ' days left' : '—'}</span>
        </div>
      </div>
    </div>`;
  }

  // ── Property Card ──
  function renderPropertyCard(propId, propItems) {
    const p = PROPERTY_MAP[propId] || { name: propId, address: '' };
    const lease = leases && leases[propId];
    const total = propItems.length;
    const pending = propItems.filter(i => resolveStatus(i) === 'PENDING').length;
    const nd = propItems.filter(i => resolveStatus(i) === 'NEEDS_DECISION').length;
    const ip = propItems.filter(i => resolveStatus(i) === 'IN_PROGRESS').length;
    const done = propItems.filter(i => resolveStatus(i) === 'DONE').length;
    const weeklyRent = lease ? lease.weeklyRent : null;
    const pendingRentMatch = lease && lease.actionStatus ? lease.actionStatus.match(/\$([\d,]+)/) : null;
    const pendingRentAmt = pendingRentMatch ? pendingRentMatch[0] : null;
    const leaseDays = lease ? daysUntilExpiry(lease.expiry) : null;

    const statusPills = [
      nd > 0 ? `<span style="background:#EDF1F7;color:#8F9BB3;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px" title="Needs Decision">${nd}</span>` : '',
      ip > 0 ? `<span style="background:#EDF1F7;color:#8F9BB3;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px" title="In Progress">${ip}</span>` : '',
      done > 0 ? `<span style="background:#EDF1F7;color:#8F9BB3;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px" title="Done">${done}</span>` : '',
    ].filter(Boolean).join('');

    // Lease Drive buttons
    const driveSearchUrl = 'https://drive.google.com/drive/search?q=' + encodeURIComponent(p.name + ' Lease Agreements');
    const leaseButtons = `<div style="display:flex;gap:8px;margin-top:10px">
      ${lease && lease.driveUrl
        ? `<a href="${esc(lease.driveUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;border:1px solid #EDF1F7;color:#8F9BB3;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all 0.15s" onmouseover="this.style.borderColor='#D1D9E6';this.style.color='#0A1327'" onmouseout="this.style.borderColor='#EDF1F7';this.style.color='#8F9BB3'">📄 Current Lease</a>`
        : `<span style="font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;border:1px solid #EDF1F7;color:#C4CDDF;opacity:0.5">📄 Current Lease</span>`}
      <a href="${esc(driveSearchUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;border:1px solid #EDF1F7;color:#8F9BB3;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all 0.15s" onmouseover="this.style.borderColor='#D1D9E6';this.style.color='#0A1327'" onmouseout="this.style.borderColor='#EDF1F7';this.style.color='#8F9BB3'">📁 All Leases</a>
    </div>`;

    return `<div class="property-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
        <div>
          <div class="prop-name">${esc(p.name)}</div>
          <div class="prop-address">${esc(p.address)}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:18px">
        <div>
          <div style="font-size:22px;font-weight:800;color:#0A1327;line-height:1">${total}</div>
          <div style="font-size:10px;font-weight:600;color:#8F9BB3;letter-spacing:0.5px;margin-top:3px">TOTAL</div>
        </div>
        <div>
          <div style="font-size:22px;font-weight:800;color:#0A1327;line-height:1">${pending}</div>
          <div style="font-size:10px;font-weight:600;color:#8F9BB3;letter-spacing:0.5px;margin-top:3px">PENDING</div>
        </div>
        ${statusPills ? `<div style="display:flex;align-items:center;gap:4px;margin-left:4px">${statusPills}</div>` : ''}
      </div>
      ${weeklyRent ? `<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:26px;font-weight:800;color:#0A1327;letter-spacing:-1px">$${weeklyRent}</span>
        <span style="font-size:13px;color:#8F9BB3;font-weight:500">/wk</span>
        ${pendingRentAmt ? `<span style="font-size:11px;font-weight:600;color:#f0a020;background:rgba(240,160,32,0.1);padding:2px 8px;border-radius:6px">↗ ${esc(pendingRentAmt)} pending</span>` : ''}
      </div>
      <div style="font-size:12px;color:#8F9BB3;margin-bottom:4px">
        ${lease && lease.expiry ? `${formatLeaseDate(lease.start)} → ${formatLeaseDate(lease.expiry)} ${leaseExpiryPill(leaseDays)}` : ''}
      </div>
      ${leaseButtons}` : `<div style="font-size:13px;color:#C4CDDF;margin-bottom:12px">No lease data</div>`}
      <button class="prop-view-details-btn" data-prop-id="${esc(propId)}" style="width:100%;padding:13px;background:#0A1327;color:#FFFFFF;border:none;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-0.2px;margin-top:14px;transition:opacity 0.15s" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">View Details</button>
    </div>`;
  }

  // ── Property View ──
  function renderPropertyView() {
    const byProp = {};
    items.forEach(item => {
      if (!byProp[item.propertyId]) byProp[item.propertyId] = [];
      byProp[item.propertyId].push(item);
    });

    const cards = PROP_ORDER
      .filter(pid => byProp[pid] && byProp[pid].length > 0)
      .map(pid => renderPropertyCard(pid, byProp[pid]))
      .join('');

    return renderLeaseBanner() +
      renderFinancialSummary() +
      `<div style="font-size:16px;font-weight:800;color:#0A1327;margin-bottom:16px;letter-spacing:-0.3px">Active Properties</div>
      <div class="property-grid">${cards}</div>`;
  }

  // ── Render ──
  function render() {
    renderStats();
    const main = document.getElementById('main');
    const filterBar = document.getElementById('filter-bar');
    const isKanban = currentView === 'kanban';
    // Show filter bar only in Kanban
    if (filterBar) filterBar.style.display = isKanban ? 'flex' : 'none';
    main.classList.toggle('with-filter', isKanban);
    if (isKanban) {
      main.innerHTML = renderKanban();
    } else {
      main.innerHTML = renderPropertyView();
    }
    bindCardClicks();
    bindGroupToggles();
    bindViewDetailsButtons();
  }

  // ── Detail Panel ──
  function openDetail(msgId) {
    const item = items.find(i => i.msgId === msgId);
    if (!item) return;
    openPanelId = msgId;
    const p = PROPERTY_MAP[item.propertyId] || { name: item.property, address: '' };
    const st = resolveStatus(item);
    const tc = typeClass(item.type);
    const urgency = item.data && item.data.urgency ? item.data.urgency : '';
    const urgCls = urgency ? ` badge-urgency-${urgency.toLowerCase()}` : '';
    const bodyText = item.data && item.data.bodyText ? item.data.bodyText : '(No body text)';

    let html = '';
    if (item.needsReview) html += `<div class="detail-review-banner">⚠ Flagged for review — classifier may have misidentified this</div>`;
    html += `<div class="detail-property">${esc(p.name)}</div>`;
    html += `<div class="detail-address">${esc(p.address)}</div>`;
    html += `<div class="detail-badges"><span class="badge badge-${tc}">${esc(item.type)}</span>${urgency ? `<span class="badge${urgCls}">${esc(urgency)}</span>` : ''}</div>`;
    html += `<div class="detail-subject">${esc(item.subject)}</div>`;
    html += `<div class="detail-row"><strong>From:</strong> ${esc(item.from)}</div>`;
    html += `<div class="detail-row"><strong>Date:</strong> ${esc(formatDate(item.emailDate))}</div>`;
    html += `<div class="detail-row"><strong>PM:</strong> ${esc(item.pm)}</div>`;
    if (item.period) html += `<div class="detail-row"><strong>Period:</strong> ${esc(item.period)}</div>`;
    html += `<div class="detail-row" style="margin-top:4px"><strong>Status:</strong> ${esc(st)}</div>`;
    html += `<div class="detail-body">${esc(bodyText)}</div>`;

    if (item.attachments && item.attachments.length > 0) {
      html += `<div class="detail-attachments"><div class="detail-att-title">Attachments (${item.attachments.length})</div>`;
      item.attachments.forEach(a => {
        const name = typeof a === 'string' ? a : (a.filename || a.name || 'attachment');
        html += `<div class="detail-att-item">📎 ${esc(name)}</div>`;
      });
      html += `</div>`;
    }

    document.getElementById('detail-content').innerHTML = html;
    document.getElementById('detail-actions').innerHTML = `
      <button class="action-btn action-btn-nfa" data-action="NFA">NFA</button>
      <button class="action-btn action-btn-progress" data-action="IN_PROGRESS">In Progress</button>
      <button class="action-btn action-btn-done" data-action="DONE">Done</button>
    `;
    document.getElementById('backdrop').classList.add('open');
    document.getElementById('detail-panel').classList.add('open');

    document.getElementById('detail-actions').querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        await setStatus(msgId, this.getAttribute('data-action'));
        closeDetail(); render();
      });
    });
  }

  function closeDetail() {
    openPanelId = null;
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
  }

  // ── Event Binding ──
  function bindCardClicks() {
    document.querySelectorAll('.card[data-id]').forEach(card => {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.group-toggle')) return;
        openDetail(this.getAttribute('data-id'));
      });
    });
    document.querySelectorAll('.mobile-tab[data-col]').forEach(tab => {
      tab.addEventListener('click', function() {
        window._mobileActiveCol = this.getAttribute('data-col');
        document.getElementById('main').innerHTML = renderKanban();
        bindCardClicks(); bindGroupToggles(); bindViewDetailsButtons();
      });
    });
  }

  function bindGroupToggles() {
    document.querySelectorAll('.group-toggle').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const gid = this.getAttribute('data-group');
        expandedGroups[gid] = !expandedGroups[gid];
        render();
      });
    });
  }

  function bindViewDetailsButtons() {
    document.querySelectorAll('.prop-view-details-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        openPropertyDetail(this.getAttribute('data-prop-id'));
      });
    });
  }

  // ── View Toggle ──
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentView = this.getAttribute('data-view');
      render();
    });
  });

  // ── Filter Chips ──
  document.querySelectorAll('.chip[data-filter-type]').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.chip[data-filter-type]').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      filterType = this.getAttribute('data-filter-type');
      render();
    });
  });

  // ── Search ──
  ['header-search-input', 'filter-search-input'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', function() {
      searchQuery = this.value.toLowerCase();
      // Sync both inputs
      ['header-search-input','filter-search-input'].forEach(oid => {
        const o = document.getElementById(oid);
        if (o && o !== this) o.value = this.value;
      });
      render();
    });
  });

  // ── Backdrop / Escape ──
  document.getElementById('backdrop').addEventListener('click', function() {
    closeDetail();
    closePropDetail();
  });
  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });

  // ── Property Detail Panel ──
  function fmtCurrency(n) {
    if (n == null) return '—';
    return '$' + Number(n).toLocaleString();
  }

  function renderIncomeChart(stmts) {
    const data = stmts
      .filter(s => s.verifyReport && s.verifyReport.rentReceived > 0)
      .sort((a, b) => new Date(a.emailDate) - new Date(b.emailDate))
      .slice(-12);
    if (data.length === 0) {
      return `<div style="text-align:center;padding:32px 0;color:#C4CDDF;font-size:12px">No statement income data yet — populates as statements arrive</div>`;
    }
    const maxVal = Math.max(...data.map(d => d.verifyReport.rentReceived));
    const W = 620; const H = 130; const PAD_L = 50; const PAD_B = 28; const PAD_T = 10;
    const chartW = W - PAD_L - 10; const chartH = H - PAD_B - PAD_T;
    const barW = Math.max(8, Math.floor(chartW / data.length) - 6);
    let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">`;
    // Grid lines
    for (let i = 0; i <= 3; i++) {
      const y = PAD_T + (chartH / 3) * i;
      const val = Math.round(maxVal * (3 - i) / 3);
      svg += `<line x1="${PAD_L}" x2="${W-10}" y1="${y}" y2="${y}" stroke="#EDF1F7" stroke-width="1"/>`;
      svg += `<text x="${PAD_L - 6}" y="${y + 4}" text-anchor="end" font-size="9" fill="#C4CDDF">$${val.toLocaleString()}</text>`;
    }
    data.forEach((d, i) => {
      const income = d.verifyReport.rentReceived;
      const barH = Math.max(3, (income / maxVal) * chartH);
      const x = PAD_L + i * (barW + 6) + 2;
      const y = PAD_T + chartH - barH;
      svg += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="4" fill="#0A1327"/>`;
      const dt = new Date(d.emailDate);
      const lbl = dt.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      svg += `<text x="${x + barW / 2}" y="${H - 4}" text-anchor="middle" font-size="8" fill="#C4CDDF">${lbl}</text>`;
      // Amount on top of bar
      if (barH > 22) svg += `<text x="${x + barW / 2}" y="${y - 4}" text-anchor="middle" font-size="9" fill="#0A1327" font-weight="600">$${Math.round(income / 100) * 100 < income ? income : income}</text>`;
    });
    svg += '</svg>';
    return svg;
  }

  function renderRentTimeline(propId, leaseData) {
    const pd = propDetails[propId] || {};
    const history = (pd.rentHistory || []).slice();
    if (history.length === 0 && leaseData) {
      history.push({ date: leaseData.start, amount: leaseData.weeklyRent, note: 'Current' });
    }
    if (history.length === 0) return '<div style="color:#C4CDDF;font-size:12px">No rent history data</div>';
    history.sort((a, b) => new Date(a.date) - new Date(b.date));
    return history.map((h, i) => {
      const isLast = i === history.length - 1;
      const isPending = h.note && h.note.toLowerCase().includes('pending');
      const increase = i > 0 ? h.amount - history[i-1].amount : null;
      const color = isPending ? '#f0a020' : isLast ? '#0A1327' : '#8F9BB3';
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid ${isLast ? 'transparent' : '#EDF1F7'}">
        <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <div style="flex:1">
          <span style="font-size:14px;font-weight:700;color:${color}">$${h.amount}/wk</span>
          ${increase !== null ? `<span style="font-size:11px;color:#2ec98e;font-weight:600;margin-left:6px">+$${increase}</span>` : ''}
          <span style="font-size:11px;color:#C4CDDF;margin-left:6px">${h.note || ''}</span>
        </div>
        <div style="font-size:11px;color:#C4CDDF">${formatLeaseDate(h.date)}</div>
      </div>`;
    }).join('');
  }

  function openPropertyDetail(propId) {
    const p = PROPERTY_MAP[propId] || { name: propId, address: '' };
    const lease = leases[propId];
    const pd = propDetails[propId] || {};
    const propItems = items.filter(i => i.propertyId === propId);
    const stmts = propItems.filter(i => i.type === 'REMITTANCE').sort((a,b) => new Date(b.emailDate) - new Date(a.emailDate));
    const maintenance = propItems.filter(i => i.type === 'MAINTENANCE').sort((a,b) => new Date(b.emailDate) - new Date(a.emailDate));
    const weeklyRent = (lease && lease.weeklyRent) || 0;
    const annualIncome = weeklyRent * 52;
    const purchasePrice = pd.purchasePrice;
    const valuation = pd.valuation;
    const grossYield = purchasePrice && weeklyRent ? ((annualIncome / purchasePrice) * 100).toFixed(2) : null;
    const capitalGrowth = purchasePrice && valuation ? (((valuation - purchasePrice) / purchasePrice) * 100).toFixed(1) : null;
    const stateColors = { wa: '#c9a227', vic: '#4a7fc1', qld: '#b05a5a', nsw: '#4a9bb0' };
    const stateKey = propId.split('-').pop();
    const stateColor = stateColors[stateKey] || '#8F9BB3';
    const stateName = { wa: 'WA', vic: 'VIC', qld: 'QLD', nsw: 'NSW' }[stateKey] || stateKey.toUpperCase();

    // All collected Drive links from statements
    const allDriveLinks = stmts.flatMap(s => s.driveLinks || []);
    const statementLinks = allDriveLinks.filter(l => l.type === 'rental-statement');
    const maintLinks = allDriveLinks.filter(l => l.type === 'maintenance-invoice');

    let html = '';

    // ── Header ──
    html += `<div class="pds-header">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="background:${stateColor};color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:0.5px">${stateName}</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:500">${esc(p.address)}</span>
      </div>
      <div style="font-size:26px;font-weight:800;color:#FFFFFF;letter-spacing:-0.8px;line-height:1.1">${esc(p.name)}</div>
      ${lease && lease.expiry ? `<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.45)">Lease: ${formatLeaseDate(lease.start)} → ${formatLeaseDate(lease.expiry)} ${leaseExpiryPill(daysUntilExpiry(lease.expiry))}</div>` : ''}
    </div>`;

    // ── Stat Cards ──
    const marketRent = pd.marketRent;
    const rentVsMarket = marketRent && weeklyRent ? weeklyRent - marketRent : null;
    const statCards = [
      { label: 'Weekly Rent', value: weeklyRent ? '$' + weeklyRent + '/wk' : '—', sub: marketRent ? (rentVsMarket >= 0 ? '✓ at market' : '$' + Math.abs(rentVsMarket) + ' below market $' + marketRent) : 'current', subColor: rentVsMarket !== null ? (rentVsMarket >= 0 ? '#2ec98e' : '#f0a020') : null },
      { label: 'Annual Income', value: weeklyRent ? '$' + annualIncome.toLocaleString() : '—', sub: 'gross estimate' },
      { label: 'Purchase Price', value: fmtCurrency(purchasePrice), sub: pd.purchaseDate ? formatLeaseDate(pd.purchaseDate) : 'not set' },
      { label: 'Valuation', value: valuation ? fmtCurrency(valuation) : '—', sub: valuation ? (pd.valuationLow && pd.valuationHigh ? '$' + Math.round(pd.valuationLow/1000) + 'k–$' + Math.round(pd.valuationHigh/1000) + 'k range' : pd.valuationSource || '') : 'not set' },
      { label: 'Yield on Purchase', value: grossYield ? grossYield + '%' : '—', sub: grossYield ? 'annual rent / purchase price' : 'data missing', subColor: grossYield ? (parseFloat(grossYield) >= 6 ? '#2ec98e' : parseFloat(grossYield) >= 5 ? '#f0a020' : null) : null },
    ];
    html += `<div class="pds-stat-grid">`;
    statCards.forEach(sc => {
      const isPending = sc.value === '—';
      html += `<div class="pds-stat-card">
        <div class="pds-stat-label">${esc(sc.label)}</div>
        <div class="pds-stat-value" style="${isPending ? 'color:#C4CDDF' : ''}">${esc(sc.value)}</div>
        <div class="pds-stat-sub" style="${sc.subColor ? 'color:' + sc.subColor : ''}">${esc(sc.sub)}</div>
      </div>`;
    });
    if (capitalGrowth) {
      html += `<div class="pds-stat-card" style="border-color:rgba(46,201,142,0.3)">
        <div class="pds-stat-label">Capital Growth</div>
        <div class="pds-stat-value" style="color:#2ec98e">+${capitalGrowth}%</div>
        <div class="pds-stat-sub">$${(valuation - purchasePrice).toLocaleString()} gain</div>
      </div>`;
    }
    // Net cash flow stat card
    if (weeklyRent && pd.insurance && pd.pmFeeRate) {
      const monthlyRent = weeklyRent * 52 / 12;
      const monthlyPMFee = monthlyRent * (pd.pmFeeRate / 100);
      const monthlyIns = pd.insurance.monthlyPremium || 0;
      const monthlyMaint = 150; // estimate
      const monthlyExpenses = monthlyPMFee + monthlyIns + monthlyMaint;
      const netCashFlow = monthlyRent - monthlyExpenses;
      const ncfColor = netCashFlow >= 0 ? '#2ec98e' : '#e55a48';
      html += `<div class="pds-stat-card" style="border-color:${netCashFlow >= 0 ? 'rgba(46,201,142,0.3)' : 'rgba(229,90,72,0.3)'}">
        <div class="pds-stat-label">Net Cash Flow</div>
        <div class="pds-stat-value" style="color:${ncfColor}">${netCashFlow >= 0 ? '' : '-'}$${Math.abs(Math.round(netCashFlow)).toLocaleString()}/mo</div>
        <div class="pds-stat-sub">After PM, insurance, maint (excl. loan)</div>
      </div>`;
    }
    html += `</div>`;

    // ── Insurance & PM Fees ──
    const ins = pd.insurance;
    const pmRate = pd.pmFeeRate;
    const pmAgency = pd.pmAgency;
    if (ins || pmRate) {
      html += `<div class="pds-card">
        <div class="pds-section-title">Insurance & Management</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
      if (ins) {
        const insExpDays = ins.expiry ? daysUntilExpiry(ins.expiry) : null;
        let insExpiryColor = '#2ec98e';
        let insExpiryBg = 'rgba(46,201,142,0.12)';
        let insExpiryLabel = '';
        if (insExpDays !== null) {
          if (insExpDays < 0) { insExpiryColor = '#e55a48'; insExpiryBg = 'rgba(229,90,72,0.12)'; insExpiryLabel = 'EXPIRED'; }
          else if (insExpDays < 60) { insExpiryColor = '#e55a48'; insExpiryBg = 'rgba(229,90,72,0.12)'; insExpiryLabel = insExpDays + 'd left'; }
          else if (insExpDays < 90) { insExpiryColor = '#f0a020'; insExpiryBg = 'rgba(240,160,32,0.12)'; insExpiryLabel = insExpDays + 'd left'; }
          else { insExpiryLabel = insExpDays + 'd left'; }
        }
        html += `<div style="background:#F8F9FB;border-radius:12px;padding:14px 16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:10px;font-weight:700;color:#8F9BB3;text-transform:uppercase;letter-spacing:0.5px">🛡️ Insurance</span>
            <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:${insExpiryBg};color:${insExpiryColor}">${insExpiryLabel}</span>
          </div>
          <div style="font-size:20px;font-weight:800;color:#0A1327;letter-spacing:-0.5px">$${ins.annualPremium.toLocaleString()}<span style="font-size:12px;font-weight:500;color:#8F9BB3">/yr</span></div>
          <div style="font-size:12px;color:#8F9BB3;margin-top:4px">$${ins.monthlyPremium.toFixed(2)}/mo · ${esc(ins.insurer)}</div>
          <div style="font-size:11px;color:#C4CDDF;margin-top:4px">Expires ${formatLeaseDate(ins.expiry)}</div>
        </div>`;
      }
      if (pmRate) {
        const monthlyPM = weeklyRent ? Math.round(weeklyRent * 52 / 12 * (pmRate / 100) * 100) / 100 : 0;
        html += `<div style="background:#F8F9FB;border-radius:12px;padding:14px 16px">
          <div style="font-size:10px;font-weight:700;color:#8F9BB3;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📋 PM Fee</div>
          <div style="font-size:20px;font-weight:800;color:#0A1327;letter-spacing:-0.5px">${pmRate}%<span style="font-size:12px;font-weight:500;color:#8F9BB3"> of rent</span></div>
          <div style="font-size:12px;color:#8F9BB3;margin-top:4px">$${monthlyPM.toFixed(2)}/mo · $${(monthlyPM * 12).toFixed(0)}/yr</div>
          ${pmAgency ? `<div style="font-size:11px;color:#C4CDDF;margin-top:4px">${esc(pmAgency)}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // ── Key Documents ──
    const hasPmAgreement = pd.pmAgreementUrl;
    const hasLease = lease && lease.driveUrl;
    const hasPmCert = pd.pmAgreementCertUrl;
    if (hasPmAgreement || hasLease || hasPmCert) {
      html += `<div class="pds-card">
        <div class="pds-section-title">Key Documents</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">`;
      if (hasLease) {
        html += `<a href="${esc(lease.driveUrl)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#F8F9FB;border:1px solid #EDF1F7;border-radius:12px;text-decoration:none;transition:all 0.15s" onmouseover="this.style.borderColor='#D1D9E6';this.style.background='#fff'" onmouseout="this.style.borderColor='#EDF1F7';this.style.background='#F8F9FB'">
          <div style="width:32px;height:32px;background:rgba(155,108,247,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px">📄</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#0A1327">Lease Agreement</div>
            <div style="font-size:10px;color:#C4CDDF">Current lease</div>
          </div>
        </a>`;
      }
      if (hasPmAgreement) {
        html += `<a href="${esc(pd.pmAgreementUrl)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#F8F9FB;border:1px solid #EDF1F7;border-radius:12px;text-decoration:none;transition:all 0.15s" onmouseover="this.style.borderColor='#D1D9E6';this.style.background='#fff'" onmouseout="this.style.borderColor='#EDF1F7';this.style.background='#F8F9FB'">
          <div style="width:32px;height:32px;background:rgba(240,160,32,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px">📋</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#0A1327">PM Agreement</div>
            <div style="font-size:10px;color:#C4CDDF">${pmAgency ? esc(pmAgency) : 'Form 6'}</div>
          </div>
        </a>`;
      }
      if (hasPmCert) {
        html += `<a href="${esc(pd.pmAgreementCertUrl)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#F8F9FB;border:1px solid #EDF1F7;border-radius:12px;text-decoration:none;transition:all 0.15s" onmouseover="this.style.borderColor='#D1D9E6';this.style.background='#fff'" onmouseout="this.style.borderColor='#EDF1F7';this.style.background='#F8F9FB'">
          <div style="width:32px;height:32px;background:rgba(143,155,179,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px">✅</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#0A1327">PM Completion Cert</div>
            <div style="font-size:10px;color:#C4CDDF">Signed confirmation</div>
          </div>
        </a>`;
      }
      html += `</div></div>`;
    }

    // ── Income Chart ──
    html += `<div class="pds-card">
      <div class="pds-section-title">Rental Income — Statement History</div>
      ${renderIncomeChart(stmts)}
    </div>`;

    // ── Rent History ──
    html += `<div class="pds-card">
      <div class="pds-section-title">Rent History</div>
      ${renderRentTimeline(propId, lease)}
    </div>`;

    // ── Recent Statements ──
    if (stmts.length > 0) {
      html += `<div class="pds-card">
        <div class="pds-section-title">Recent Statements (${stmts.length})</div>`;
      stmts.slice(0, 6).forEach(s => {
        const net = s.verifyReport ? s.verifyReport.rentReceived : 0;
        const stmtDriveLinks = (s.driveLinks || []).filter(l => l.type === 'rental-statement');
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #EDF1F7">
          <div>
            <div style="font-size:13px;font-weight:500;color:#0A1327">${esc(s.period || formatDate(s.emailDate))}</div>
            <div style="font-size:11px;color:#8F9BB3;margin-top:1px">${esc(s.pm)} · ${esc(formatDate(s.emailDate))}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:14px;font-weight:700;color:${net > 0 ? '#2ec98e' : '#C4CDDF'}">${net > 0 ? '$' + net.toLocaleString() : '—'}</span>
            ${stmtDriveLinks[0] ? `<a href="${esc(stmtDriveLinks[0].url)}" target="_blank" rel="noopener" style="font-size:11px;padding:3px 8px;border:1px solid #EDF1F7;border-radius:6px;color:#8F9BB3;text-decoration:none" onmouseover="this.style.borderColor='#D1D9E6';this.style.color='#0A1327'" onmouseout="this.style.borderColor='#EDF1F7';this.style.color='#8F9BB3'">📄 PDF</a>` : ''}
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Maintenance ──
    if (maintenance.length > 0) {
      html += `<div class="pds-card">
        <div class="pds-section-title">Maintenance (${maintenance.length})</div>`;
      maintenance.slice(0, 5).forEach(m => {
        const st = resolveStatus(m);
        const stColor = st === 'DONE' ? '#2ec98e' : st === 'IN_PROGRESS' ? '#0A1327' : '#f0a020';
        html += `<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px solid #EDF1F7;cursor:pointer" onclick="openDetail('${esc(m.msgId)}')">
          <div style="flex:1;margin-right:10px">
            <div style="font-size:12px;font-weight:500;color:#0A1327;line-height:1.4">${esc(m.subject)}</div>
            <div style="font-size:11px;color:#8F9BB3;margin-top:2px">${esc(formatDate(m.emailDate))}</div>
          </div>
          <span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:${stColor}1a;color:${stColor};flex-shrink:0;margin-top:2px">${esc(st)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Documents ──
    if (statementLinks.length > 0 || maintLinks.length > 0) {
      html += `<div class="pds-card">
        <div class="pds-section-title">Documents in Drive (${statementLinks.length + maintLinks.length})</div>`;
      [...statementLinks, ...maintLinks].slice(0, 8).forEach(dl => {
        html += `<div style="padding:6px 0;border-bottom:1px solid #EDF1F7">
          <a href="${esc(dl.url)}" target="_blank" rel="noopener" style="font-size:12px;color:#0A1327;text-decoration:none;display:flex;align-items:center;gap:6px" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">
            <span style="color:#8F9BB3">📄</span>${esc(dl.name || dl.type)}
          </a>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Inbox Summary ──
    const pending = propItems.filter(i => resolveStatus(i) === 'PENDING').length;
    const nd = propItems.filter(i => resolveStatus(i) === 'NEEDS_DECISION').length;
    html += `<div class="pds-card" style="margin-bottom:0">
      <div class="pds-section-title">Inbox Summary</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        ${[['Total', propItems.length,'#0A1327'],['Pending', pending,'#f0a020'],['Needs Decision',nd,'#e55a48'],['Maintenance',maintenance.length,'#f0a020'],['Remittance',stmts.length,'#2ec98e']].map(([l,v,c])=>`<div style="text-align:center;min-width:60px"><div style="font-size:20px;font-weight:800;color:${c}">${v}</div><div style="font-size:10px;color:#8F9BB3;font-weight:600;letter-spacing:0.3px">${l}</div></div>`).join('')}
      </div>
    </div>`;

    html += `<div style="height:16px"></div>`;

    document.getElementById('prop-detail-content').innerHTML = html;
    document.getElementById('prop-detail-panel').classList.add('open');
    document.getElementById('backdrop').classList.add('open');
  }

  function closePropDetail() {
    document.getElementById('prop-detail-panel').classList.remove('open');
    document.getElementById('backdrop').classList.remove('open');
  }

  document.getElementById('prop-detail-close').addEventListener('click', closePropDetail);

  // ── Fetch ──
  async function fetchLeases() {
    try {
      const res = await fetch(LEASES_URL + '?_=' + Date.now());
      if (res.ok) leases = await res.json();
    } catch (e) {
      console.warn('Leases unavailable:', e.message);
    }
  }

  async function fetchPropDetails() {
    try {
      const res = await fetch(PROP_DETAILS_URL + '?_=' + Date.now());
      if (res.ok) propDetails = await res.json();
    } catch (e) {
      console.warn('PropDetails unavailable:', e.message);
    }
  }

  async function loadData() {
    try {
      const [queueRes] = await Promise.all([
        fetch(DATA_URL + '?_=' + Date.now()),
        fetchStatusMap(),
        fetchLeases(),
        fetchPropDetails()
      ]);
      if (!queueRes.ok) throw new Error('HTTP ' + queueRes.status);
      const data = await queueRes.json();
      items = Array.isArray(data) ? data : (data.items || data.queue || []);
      items.sort((a, b) => new Date(b.emailDate || b.scannedAt) - new Date(a.emailDate || a.scannedAt));
      render();
    } catch (err) {
      document.getElementById('main').innerHTML =
        `<div class="loading" style="color:var(--red)">Failed to load data: ${esc(err.message)}</div>`;
    }
  }

  // ── Init ──
  renderHeroDate();
  loadData();

})();
</script>
</body>
</html>
