<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Inbox — Pencev Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F8F9FB;
  --surface: #FFFFFF;
  --surface-2: #F4F6F9;
  --surface-3: #EDF1F7;
  --border: #EDF1F7;
  --border-hover: #D1D9E6;
  --text: #0A1327;
  --text-muted: #8F9BB3;
  --text-dim: #C4CDDF;
  --accent: #0A1327;
  --accent-glow: rgba(10,19,39,0.06);
  --green: #2ec98e;
  --amber: #f0a020;
  --red: #e55a48;
  --purple: #9b6cf7;
  --header-h: 56px;
  --filter-h: 52px;
  --stats-h: 36px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: #FFFFFF;
  border-bottom: 1px solid #EDF1F7;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.monogram {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: #0A1327;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff;
  letter-spacing: -0.5px;
}
.header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: #0A1327; }
.header-right { display: flex; align-items: center; gap: 8px; }
.view-toggle {
  display: flex; background: #FFFFFF; border-radius: 8px;
  border: 1px solid #EDF1F7; overflow: hidden;
}
.view-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  background: none; border: none; color: #8F9BB3;
  cursor: pointer; transition: all 150ms;
  font-family: inherit;
}
.view-btn:hover { color: #0A1327; }
.view-btn.active { background: #0A1327; color: #FFFFFF; }

/* ── Filter Bar ── */
.filter-bar {
  position: fixed; top: var(--header-h); left: 0; right: 0;
  height: var(--filter-h);
  display: flex; align-items: center; gap: 8px;
  padding: 0 24px;
  background: #FFFFFF;
  border-bottom: 1px solid #EDF1F7;
  z-index: 99;
  overflow-x: auto;
  flex-wrap: nowrap;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-sep {
  width: 1px; height: 24px; background: var(--border);
  flex-shrink: 0; margin: 0 4px;
}
.chip {
  padding: 5px 14px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  background: #FFFFFF; border: 1px solid #EDF1F7;
  color: #8F9BB3; cursor: pointer;
  transition: all 150ms; white-space: nowrap;
  font-family: inherit; flex-shrink: 0;
}
.chip:hover { border-color: #D1D9E6; color: #0A1327; }
.chip.active {
  background: #0A1327; border-color: #0A1327;
  color: #FFFFFF;
}

/* ── Stats Bar ── */
.stats-bar {
  position: fixed;
  top: calc(var(--header-h) + var(--filter-h));
  left: 0; right: 0;
  height: var(--stats-h);
  display: flex; align-items: center;
  padding: 0 24px;
  font-size: 12px; color: #8F9BB3;
  background: #F8F9FB;
  border-bottom: 1px solid #EDF1F7;
  z-index: 98; gap: 4px;
}
.stats-bar span { white-space: nowrap; }
.stats-bar .stat-dot { margin: 0 6px; }

/* ── Main Content ── */
.main {
  position: fixed;
  top: calc(var(--header-h) + var(--filter-h) + var(--stats-h));
  left: 0; right: 0; bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 20px 24px 40px;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 3px; }
.main::-webkit-scrollbar-thumb:hover { background: #D1D9E6; }

/* ── Kanban ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  min-height: 100%;
}
.kanban-col { display: flex; flex-direction: column; gap: 8px; }
.col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 12px;
  border-bottom: 1px solid #EDF1F7;
  margin-bottom: 4px;
}
.col-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #8F9BB3; }
.col-count {
  font-size: 11px; font-weight: 600;
  background: #FFFFFF; color: #0A1327;
  border: 1px solid #EDF1F7;
  padding: 2px 8px; border-radius: 100px;
}

/* ── Cards ── */
.card {
  background: #FFFFFF;
  border: 1px solid #EDF1F7;
  border-left: 3px solid #EDF1F7;
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 150ms;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.card:hover {
  border-color: #D1D9E6;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  transform: translateY(-1px);
}
.card.nfa-card {
  opacity: 0.5;
}
.card.nfa-card:hover { opacity: 0.75; }
.card-type-maintenance { border-left-color: var(--amber); }
.card-type-remittance { border-left-color: var(--green); }
.card-type-lease { border-left-color: var(--purple); }
.card-type-other { border-left-color: var(--text-dim); }

.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.badge {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px;
}
.badge-maintenance { background: rgba(240,160,32,0.12); color: #f0a020; }
.badge-remittance { background: rgba(46,201,142,0.12); color: #2ec98e; }
.badge-lease { background: rgba(155,108,247,0.12); color: #9b6cf7; }
.badge-other { background: #F4F6F9; color: #8F9BB3; }
.badge-urgency-high { background: rgba(229,90,72,0.1); color: #e55a48; }
.badge-urgency-medium { background: rgba(240,160,32,0.1); color: #f0a020; }
.badge-urgency-low { background: #F4F6F9; color: #8F9BB3; }

.card-subject {
  font-size: 13px; font-weight: 500; color: #0A1327;
  line-height: 1.4; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  font-size: 11px; color: #8F9BB3;
  display: flex; align-items: center; gap: 8px;
}
.card-property { color: #8F9BB3; font-weight: 500; }
.card-date { color: #C4CDDF; }

/* ── Group (thread) ── */
.group-wrapper { display: flex; flex-direction: column; gap: 0; }
.group-toggle {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #C4CDDF; cursor: pointer;
  padding: 4px 8px; background: none; border: none;
  font-family: inherit; transition: color 150ms;
}
.group-toggle:hover { color: #8F9BB3; }
.group-toggle svg { transition: transform 150ms; }
.group-toggle.expanded svg { transform: rotate(90deg); }
.group-children {
  display: none; flex-direction: column; gap: 6px;
  padding-left: 12px; margin-top: 6px;
  border-left: 2px solid #EDF1F7;
}
.group-children.open { display: flex; }

/* ── By Property View ── */
.property-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.property-card {
  background: #FFFFFF;
  border: 1px solid #EDF1F7;
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all 150ms;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.property-card:hover {
  border-color: #D1D9E6;
  background: #F8F9FB;
}
.property-card.expanded {
  grid-column: 1 / -1;
  cursor: default;
  background: #FFFFFF;
}
.prop-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #0A1327; }
.prop-address { font-size: 12px; color: #8F9BB3; margin-bottom: 14px; }
.prop-stats { display: flex; gap: 12px; flex-wrap: wrap; }
.prop-stat {
  font-size: 12px; color: #8F9BB3;
  display: flex; align-items: center; gap: 4px;
}
.prop-stat-val { font-weight: 600; color: #0A1327; }
.prop-items { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.prop-collapse-btn {
  margin-top: 12px; padding: 6px 14px;
  font-size: 12px; font-weight: 500;
  background: #F4F6F9; border: 1px solid #EDF1F7;
  border-radius: 8px; color: #8F9BB3;
  cursor: pointer; font-family: inherit; transition: all 150ms;
}
.prop-collapse-btn:hover { border-color: #D1D9E6; color: #0A1327; }

/* ── Lease Section (Property Cards) ── */
.lease-divider {
  border: none; border-top: 1px solid #EDF1F7;
  margin: 14px 0 12px;
}
.lease-section { display: flex; flex-direction: column; gap: 8px; }
.lease-rent {
  font-size: 22px; font-weight: 700; color: #0A1327;
  letter-spacing: -0.5px; line-height: 1.2;
}
.lease-rent-suffix {
  font-size: 13px; font-weight: 500; color: #8F9BB3;
}
.lease-pending {
  font-size: 12px; font-weight: 600; color: #f0a020;
}
.lease-period {
  font-size: 12px; color: #8F9BB3; line-height: 1.4;
}
.lease-expiry-pill {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
  line-height: 1.4; vertical-align: middle;
  margin-left: 4px;
}
.lease-expiry-red { background: rgba(229,90,72,0.15); color: var(--red); }
.lease-expiry-amber { background: rgba(240,160,32,0.15); color: var(--amber); }
.lease-expiry-green { background: rgba(46,201,142,0.15); color: var(--green); }
.lease-expiry-expired { background: rgba(229,90,72,0.25); color: var(--red); }
.lease-buttons { display: flex; gap: 8px; margin-top: 4px; }
.lease-btn {
  font-size: 11px; font-weight: 500; font-family: inherit;
  padding: 4px 10px; border-radius: 8px;
  background: none; border: 1px solid #EDF1F7;
  color: #8F9BB3; cursor: pointer;
  transition: all 150ms; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.lease-btn:hover { border-color: #D1D9E6; color: #0A1327; }
.lease-btn-disabled {
  opacity: 0.35; cursor: default; pointer-events: none;
}

/* ── Detail Panel ── */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
.backdrop.open { opacity: 1; pointer-events: all; }

.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 420px; max-width: 100vw;
  background: #FFFFFF;
  border-left: 1px solid #EDF1F7;
  z-index: 201;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 250ms cubic-bezier(0.16, 1, 0.3, 1);
}
.detail-panel.open { transform: translateX(0); }

.detail-scroll {
  flex: 1; overflow-y: auto; padding: 28px 24px 24px;
}
.detail-scroll::-webkit-scrollbar { width: 4px; }
.detail-scroll::-webkit-scrollbar-track { background: transparent; }
.detail-scroll::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 2px; }
.detail-scroll::-webkit-scrollbar-thumb:hover { background: #D1D9E6; }

.detail-close {
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px;
  background: #F4F6F9; border: 1px solid #EDF1F7;
  border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #8F9BB3; transition: all 150ms;
  z-index: 5;
}
.detail-close:hover { background: #EDF1F7; color: #0A1327; }

.detail-review-banner {
  background: rgba(240,160,32,0.08);
  border: 1px solid rgba(240,160,32,0.25);
  border-radius: 6px; padding: 10px 14px;
  font-size: 12px; color: #f0a020; margin-bottom: 16px;
  line-height: 1.4;
}
.detail-property {
  font-size: 18px; font-weight: 700; margin-bottom: 2px;
  letter-spacing: -0.3px; color: #0A1327;
}
.detail-address { font-size: 13px; color: #8F9BB3; margin-bottom: 16px; }
.detail-badges { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.detail-subject {
  font-size: 14px; font-weight: 600; margin-bottom: 12px;
  line-height: 1.4; color: #0A1327;
}
.detail-row {
  font-size: 12px; color: #8F9BB3; margin-bottom: 6px;
}
.detail-row strong { color: #0A1327; font-weight: 500; }
.detail-body {
  margin-top: 16px; padding: 16px;
  background: #F8F9FB; border: 1px solid #EDF1F7;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.6;
  color: #8F9BB3;
  white-space: pre-wrap; word-break: break-word;
  max-height: 320px; overflow-y: auto;
}
.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-track { background: transparent; }
.detail-body::-webkit-scrollbar-thumb { background: #EDF1F7; border-radius: 2px; }
.detail-body::-webkit-scrollbar-thumb:hover { background: #D1D9E6; }
.detail-attachments { margin-top: 16px; }
.detail-att-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
.detail-att-item {
  font-size: 12px; color: var(--text-dim); padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.detail-actions {
  padding: 16px 24px;
  border-top: 1px solid #EDF1F7;
  display: flex; gap: 8px;
  background: #FFFFFF;
}
.action-btn {
  flex: 1; padding: 10px 0;
  border: 1px solid #EDF1F7; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 150ms;
  background: #F4F6F9; color: #8F9BB3;
}
.action-btn:hover { border-color: #D1D9E6; color: #0A1327; }
.action-btn-nfa { color: #C4CDDF; }
.action-btn-nfa:hover { color: #8F9BB3; border-color: #C4CDDF; }
.action-btn-progress { border-color: rgba(10,19,39,0.2); color: #0A1327; }
.action-btn-progress:hover { background: rgba(10,19,39,0.06); border-color: #0A1327; }
.action-btn-done { border-color: rgba(46,201,142,0.3); color: #2ec98e; }
.action-btn-done:hover { background: rgba(46,201,142,0.08); border-color: #2ec98e; }

/* ── Mobile Kanban Tabs ── */
@media (max-width: 768px) {
  .kanban-board { display: block !important; }
  .kanban-col { display: none !important; }
  .kanban-col.mobile-active { display: flex !important; flex-direction: column; }
  .mobile-tab-bar { display: flex !important; }
  .kanban-board { padding-top: 0 !important; }
}
.mobile-tab-bar {
  display: none;
  background: #FFFFFF;
  border-bottom: 1px solid #EDF1F7;
  overflow-x: auto; scrollbar-width: none;
}
.mobile-tab-bar::-webkit-scrollbar { display: none; }
.mobile-tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: #8F9BB3; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; }
.mobile-tab.active { color: #0A1327; border-bottom-color: #0A1327; }

/* ── Loading ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: #8F9BB3; font-size: 13px;
}
.loading-spinner {
  width: 20px; height: 20px; border: 2px solid #EDF1F7;
  border-top-color: #0A1327; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Empty ── */
.empty-col {
  font-size: 12px; color: #C4CDDF; padding: 20px 0;
  text-align: center;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .kanban { grid-template-columns: 1fr; gap: 24px; }
  .detail-panel { width: 100vw; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="monogram">PC</div>
    <div class="header-title">Property Inbox</div>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" data-view="kanban">Kanban</button>
      <button class="view-btn" data-view="property">By Property</button>
    </div>
    <button id="refresh-btn" title="Refresh" style="margin-left:10px;background:#FFFFFF;border:1px solid #EDF1F7;color:#8F9BB3;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;transition:all 0.15s" onmouseover="this.style.borderColor='#D1D9E6';this.style.color='#0A1327'" onmouseout="this.style.borderColor='#EDF1F7';this.style.color='#8F9BB3'">↻</button>
  </div>
</header>

<!-- Filter Bar -->
<div class="filter-bar">
  <button class="chip active" data-filter-type="ALL">All</button>
  <button class="chip" data-filter-type="MAINTENANCE">Maintenance</button>
  <button class="chip" data-filter-type="REMITTANCE">Remittance</button>
  <button class="chip" data-filter-type="LEASE">Lease</button>
  <button class="chip" data-filter-type="OTHER">Other</button>
  <div class="filter-sep"></div>
  <button class="chip active" data-filter-prop="ALL">All Properties</button>
  <button class="chip" data-filter-prop="camillo-wa">Camillo</button>
  <button class="chip" data-filter-prop="west-wodonga-vic">West Wodonga</button>
  <button class="chip" data-filter-prop="wilsonton-qld">Wilsonton</button>
  <button class="chip" data-filter-prop="lavington-nsw">Lavington</button>
  <button class="chip" data-filter-prop="townsville-qld">Kirwan</button>
</div>

<!-- Stats Bar -->
<div class="stats-bar" id="stats-bar"></div>

<!-- Lease Expiry Banner -->
<div id="lease-banner" style="display:none;margin:0;padding:10px 24px;font-size:13px;font-weight:500;border-bottom:1px solid rgba(0,0,0,0.2)"></div>

<!-- Main -->
<div class="main" id="main">
  <div class="loading"><div class="loading-spinner"></div>Loading queue…</div>
</div>

<!-- Detail Panel -->
<div class="backdrop" id="backdrop"></div>
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" id="detail-close" aria-label="Close">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <div class="detail-scroll" id="detail-content"></div>
  <div class="detail-actions" id="detail-actions"></div>
</div>

<script>
(function() {
  'use strict';

  // ── Constants ──
  const DATA_URL = 'https://raw.githubusercontent.com/tankinsurance/property-inbox/main/queue.json';
  const API_URL = 'https://property-inbox-api.marel-e1f.workers.dev';

  const PROPERTY_MAP = {
    'camillo-wa':        { name: 'Camillo WA',        address: '61 Amanda Drive, Camillo WA' },
    'west-wodonga-vic':  { name: 'West Wodonga VIC',  address: '7 Schultz Ct, West Wodonga VIC' },
    'wilsonton-qld':     { name: 'Wilsonton QLD',     address: '36 Catalina Dr, Wilsonton QLD' },
    'lavington-nsw':     { name: 'Lavington NSW',     address: '379 Prune St, Lavington NSW' },
    'townsville-qld':    { name: 'Kirwan QLD',        address: '13 President St, Kirwan (Townsville) QLD' }
  };

  const PROP_COLORS = {
    'camillo-wa':       '#c9a227',
    'west-wodonga-vic': '#4a7fc1',
    'wilsonton-qld':    '#b05a5a',
    'lavington-nsw':    '#4a9bb0',
    'townsville-qld':   '#b05a5a',
  };

  const COLUMNS = [
    { key: 'PENDING',     label: 'Inbox' },
    { key: 'NEEDS_DECISION', label: 'Needs Decision' },
    { key: 'IN_PROGRESS', label: 'In Progress' },
    { key: 'DONE',        label: 'Done' }
  ];

  const TYPE_COLORS = {
    MAINTENANCE: 'maintenance',
    REMITTANCE:  'remittance',
    LEASE:       'lease'
  };

  // ── State ──
  let items = [];
  let leases = {};
  let currentView = 'kanban';
  let filterType = 'ALL';
  let filterProp = 'ALL';
  let openPanelId = null;
  let expandedProperties = {};
  let expandedGroups = {};

  // ── Utility ──
  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Status map loaded from Worker KV on startup
  let _statusMap = {};

  async function fetchStatusMap() {
    try {
      const res = await fetch(API_URL + '/status');
      if (res.ok) _statusMap = await res.json();
    } catch (e) {
      // Fall back to empty map — UI still works, just won't have persisted statuses
      console.warn('Status API unavailable, using session memory:', e.message);
    }
  }

  async function setStatus(msgId, status) {
    if (status === 'PENDING') { delete _statusMap[msgId]; }
    else { _statusMap[msgId] = status; }
    try {
      await fetch(API_URL + '/status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msgId, status })
      });
    } catch (e) {
      console.warn('Status save failed (offline?):', e.message);
    }
  }

  function resolveStatus(item) {
    // REMITTANCE → always auto-done (processed in background)
    if (item.type === 'REMITTANCE') return 'DONE';
    if (_statusMap[item.msgId]) return _statusMap[item.msgId];
    if (item.needsReview) return 'NEEDS_DECISION';
    return 'PENDING';
  }

  function columnForStatus(s) {
    if (s === 'NFA' || s === 'DONE') return 'DONE';
    if (s === 'IN_PROGRESS') return 'IN_PROGRESS';
    if (s === 'NEEDS_DECISION') return 'NEEDS_DECISION';
    return 'PENDING';
  }

  function typeClass(type) {
    return TYPE_COLORS[type] || 'other';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return dateStr; }
  }

  function shortPropName(propertyId) {
    const p = PROPERTY_MAP[propertyId];
    return p ? p.name : propertyId;
  }

  // ── Lease helpers ──
  const LEASES_URL = 'https://raw.githubusercontent.com/tankinsurance/property-inbox/main/leases.json';

  function formatLeaseDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return dateStr; }
  }

  function daysUntilExpiry(expiryStr) {
    if (!expiryStr) return null;
    const now = new Date();
    now.setHours(0,0,0,0);
    const exp = new Date(expiryStr + 'T00:00:00');
    const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
    return diff;
  }

  function leaseExpiryPill(days) {
    if (days === null) return '';
    if (days < 0) return `<span class="lease-expiry-pill lease-expiry-expired">Expired ${Math.abs(days)}d ago</span>`;
    let cls = 'lease-expiry-green';
    if (days <= 30) cls = 'lease-expiry-red';
    else if (days <= 60) cls = 'lease-expiry-amber';
    return `<span class="lease-expiry-pill ${cls}">${days}d left</span>`;
  }

  function leaseSectionHTML(propertyId) {
    const lease = leases[propertyId];
    if (!lease) return '';
    const propName = PROPERTY_MAP[propertyId] ? PROPERTY_MAP[propertyId].name : propertyId;
    const driveSearchUrl = 'https://drive.google.com/drive/search?q=' + encodeURIComponent(propName + ' Lease Agreements');
    const days = daysUntilExpiry(lease.expiry);

    let html = '<hr class="lease-divider">';
    html += '<div class="lease-section">';
    // Weekly rent
    html += `<div class="lease-rent">$${esc(String(lease.weeklyRent))}<span class="lease-rent-suffix">/wk</span></div>`;
    // Pending rent
    if (lease.pendingRent) {
      html += `<div class="lease-pending">↑ $${esc(String(lease.pendingRent))}/wk pending</div>`;
    }
    // Lease period + expiry pill
    html += `<div class="lease-period">${esc(formatLeaseDate(lease.start))} → ${esc(formatLeaseDate(lease.expiry))} ${leaseExpiryPill(days)}</div>`;
    // Buttons
    html += '<div class="lease-buttons">';
    if (lease.driveUrl) {
      html += `<a class="lease-btn" href="${esc(lease.driveUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📄 Current Lease</a>`;
    } else {
      html += `<span class="lease-btn lease-btn-disabled">📄 Current Lease</span>`;
    }
    html += `<a class="lease-btn" href="${esc(driveSearchUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📁 All Leases</a>`;
    html += '</div>';
    html += '</div>';
    return html;
  }

  // ── Filtering ──
  function filtered() {
    return items.filter(it => {
      if (filterType !== 'ALL' && it.type !== filterType) return false;
      if (filterProp !== 'ALL' && it.propertyId !== filterProp) return false;
      return true;
    });
  }

  // ── Stats ──
  function renderStats() {
    const all = filtered();
    const maint = all.filter(i => i.type === 'MAINTENANCE').length;
    const remit = all.filter(i => i.type === 'REMITTANCE').length;
    const lease = all.filter(i => i.type === 'LEASE').length;
    const nfa = all.filter(i => resolveStatus(i) === 'NFA').length;
    const inp = all.filter(i => resolveStatus(i) === 'IN_PROGRESS').length;
    const done = all.filter(i => resolveStatus(i) === 'DONE').length;
    document.getElementById('stats-bar').innerHTML =
      `<span>${all.length} items</span><span class="stat-dot">·</span>` +
      `<span>${maint} maintenance</span><span class="stat-dot">·</span>` +
      `<span>${remit} remittance</span><span class="stat-dot">·</span>` +
      `<span>${lease} lease</span><span class="stat-dot">·</span>` +
      `<span>NFA ${nfa}</span><span class="stat-dot">·</span>` +
      `<span>In Progress ${inp}</span><span class="stat-dot">·</span>` +
      `<span>Done ${done}</span>`;
  }

  // ── Card HTML ──
  function cardHTML(item) {
    const st = resolveStatus(item);
    const tc = typeClass(item.type);
    const nfaCls = st === 'NFA' ? ' nfa-card' : '';
    const urgency = item.data && item.data.urgency ? item.data.urgency : '';
    const urgCls = urgency ? ` badge-urgency-${urgency.toLowerCase()}` : '';
    return `<div class="card card-type-${tc}${nfaCls}" data-id="${esc(item.msgId)}">
      <div class="card-top">
        <span class="badge badge-${tc}">${esc(item.type)}</span>
        ${urgency ? `<span class="badge${urgCls}">${esc(urgency)}</span>` : ''}
      </div>
      <div class="card-subject">${esc(item.subject)}</div>
      <div class="card-meta">
        <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${PROP_COLORS[item.propertyId]||'var(--text-dim)'};margin-right:5px;vertical-align:middle;flex-shrink:0"></span>
        <span class="card-property">${esc(shortPropName(item.propertyId))}</span>
        <span class="card-date">${esc(formatDate(item.emailDate))}</span>
      </div>
    </div>`;
  }

  // ── Grouping for Kanban ──
  function groupItems(arr) {
    const groups = {};
    const order = [];
    arr.forEach(item => {
      const key = item.propertyId + '|' + item.type;
      if (!groups[key]) {
        groups[key] = [];
        order.push(key);
      }
      groups[key].push(item);
    });
    // sort each group by date descending
    for (const k in groups) {
      groups[k].sort((a, b) => new Date(b.emailDate || b.scannedAt) - new Date(a.emailDate || a.scannedAt));
    }
    return order.map(k => groups[k]);
  }

  function groupHTML(group) {
    if (group.length === 1) return cardHTML(group[0]);
    const gid = group[0].propertyId + '|' + group[0].type;
    const isExpanded = expandedGroups[gid];
    const chevron = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 1l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    let html = `<div class="group-wrapper">`;
    html += cardHTML(group[0]);
    html += `<button class="group-toggle${isExpanded ? ' expanded' : ''}" data-group="${esc(gid)}">${chevron} ${group.length - 1} more ${esc(group[0].type.toLowerCase())} item${group.length - 1 > 1 ? 's' : ''}</button>`;
    html += `<div class="group-children${isExpanded ? ' open' : ''}">`;
    for (let i = 1; i < group.length; i++) {
      html += cardHTML(group[i]);
    }
    html += `</div></div>`;
    return html;
  }

  // ── Kanban View ──
  function renderKanban() {
    const f = filtered();
    const buckets = { PENDING: [], NEEDS_DECISION: [], IN_PROGRESS: [], DONE: [] };
    f.forEach(item => {
      const st = resolveStatus(item);
      const col = columnForStatus(st);
      buckets[col].push(item);
    });

    const mobileActiveCol = window._mobileActiveCol || 'PENDING';
    const tabsHtml = `<div class="mobile-tab-bar">${COLUMNS.map(c=>`<button class="mobile-tab${c.key===mobileActiveCol?' active':''}" data-col="${c.key}">${c.label} <span style="opacity:0.6;font-size:11px">${buckets[c.key].length}</span></button>`).join('')}</div>`;
    let html = tabsHtml + '<div class="kanban kanban-board">';
    COLUMNS.forEach(col => {
      const colItems = buckets[col.key];
      const groups = groupItems(colItems);
      const mobileActive = col.key === mobileActiveCol ? ' mobile-active' : '';
      html += `<div class="kanban-col${mobileActive}">
        <div class="col-header">
          <span class="col-label">${esc(col.label)}</span>
          <span class="col-count">${colItems.length}</span>
        </div>`;
      if (groups.length === 0) {
        html += `<div class="empty-col">No items</div>`;
      } else {
        groups.forEach(g => { html += groupHTML(g); });
      }
      html += `</div>`;
    });
    html += '</div>';
    return html;
  }

  // ── By Property View ──
  function renderPropertyView() {
    const f = filtered();
    const propIds = Object.keys(PROPERTY_MAP);
    let html = '<div class="property-grid">';

    propIds.forEach(pid => {
      const propItems = f.filter(i => i.propertyId === pid);
      if (propItems.length === 0 && filterProp === 'ALL') return;
      const p = PROPERTY_MAP[pid];
      const isExpanded = expandedProperties[pid];

      const maint = propItems.filter(i => i.type === 'MAINTENANCE').length;
      const remit = propItems.filter(i => i.type === 'REMITTANCE').length;
      const lease = propItems.filter(i => i.type === 'LEASE').length;
      const pending = propItems.filter(i => resolveStatus(i) === 'PENDING').length;

      const propColor = PROP_COLORS[pid] || 'var(--border)';
      if (isExpanded) {
        html += `<div class="property-card expanded" data-prop-id="${esc(pid)}" style="border-left:3px solid ${propColor}">
          <div class="prop-name">${esc(p.name)}</div>
          <div class="prop-address">${esc(p.address)}</div>
          <div class="prop-stats">
            <div class="prop-stat"><span class="prop-stat-val">${propItems.length}</span> total</div>
            <div class="prop-stat"><span class="prop-stat-val">${pending}</span> pending</div>
            <div class="prop-stat"><span class="prop-stat-val">${maint}</span> maintenance</div>
            <div class="prop-stat"><span class="prop-stat-val">${remit}</span> remittance</div>
            <div class="prop-stat"><span class="prop-stat-val">${lease}</span> lease</div>
          </div>
          ${leaseSectionHTML(pid)}
          <div class="prop-items">`;
        propItems
          .sort((a, b) => new Date(b.emailDate || b.scannedAt) - new Date(a.emailDate || a.scannedAt))
          .forEach(item => { html += cardHTML(item); });
        html += `</div>
          <button class="prop-collapse-btn" data-collapse-prop="${esc(pid)}">Collapse</button>
        </div>`;
      } else {
        html += `<div class="property-card" data-expand-prop="${esc(pid)}" style="border-left:3px solid ${propColor}">
          <div class="prop-name">${esc(p.name)}</div>
          <div class="prop-address">${esc(p.address)}</div>
          <div class="prop-stats">
            <div class="prop-stat"><span class="prop-stat-val">${propItems.length}</span> total</div>
            <div class="prop-stat"><span class="prop-stat-val">${pending}</span> pending</div>
            ${maint ? `<div class="prop-stat"><span class="prop-stat-val">${maint}</span> maint</div>` : ''}
            ${remit ? `<div class="prop-stat"><span class="prop-stat-val">${remit}</span> remit</div>` : ''}
            ${lease ? `<div class="prop-stat"><span class="prop-stat-val">${lease}</span> lease</div>` : ''}
          </div>
          ${leaseSectionHTML(pid)}
        </div>`;
      }
    });

    html += '</div>';
    return html;
  }

  // ── Lease Expiry Banner ──
  function renderLeaseBanner() {
    const banner = document.getElementById('lease-banner');
    if (!leases || currentView !== 'kanban') { banner.style.display = 'none'; return; }
    const today = new Date();
    const todayKey = today.toISOString().slice(0,10);
    const dismissed = localStorage.getItem('pc-banner-dismissed') === todayKey;
    if (dismissed) { banner.style.display = 'none'; return; }
    const expiring = Object.values(leases)
      .filter(l => l.expiry)
      .map(l => { const days = Math.round((new Date(l.expiry) - today) / 86400000); return { ...l, days }; })
      .filter(l => l.days <= 60 && l.days >= 0)
      .sort((a,b) => a.days - b.days);
    if (!expiring.length) { banner.style.display = 'none'; return; }
    const alerts = expiring.map(l => {
      const color = l.days <= 30 ? '#e55a48' : '#f0a020';
      const pending = l.pendingRent ? ` Renewal at $${l.pendingRent}/wk pending.` : '';
      const status = l.actionStatus ? ` ${l.actionStatus}.` : pending;
      return `<span style="color:${color}">⚠️ <strong>${esc(l.name)}</strong> — lease expires in ${l.days} days (${new Date(l.expiry).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}).${status}</span>`;
    }).join('<span style="margin:0 12px;color:var(--border)">|</span>');
    const bgColor = expiring[0].days <= 30 ? 'rgba(229,90,72,0.12)' : 'rgba(240,160,32,0.12)';
    banner.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:10px 24px;font-size:13px;font-weight:500;background:${bgColor};border-bottom:1px solid rgba(0,0,0,0.2)`;
    banner.innerHTML = `<div style="flex:1">${alerts}</div><button onclick="localStorage.setItem('pc-banner-dismissed','${todayKey}');this.parentElement.style.display='none'" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:0 0 0 16px">×</button>`;
  }

  // ── Property Financial Summary ──
  function renderFinancialSummary() {
    if (!leases) return '';
    const props = Object.values(leases);
    const totalWeekly = props.reduce((s, l) => s + (l.weeklyRent || 0), 0);
    const annual = totalWeekly * 52;
    const occupied = props.length;
    const soonest = props.filter(l=>l.expiry).map(l=>({...l,days:Math.round((new Date(l.expiry)-new Date())/86400000)})).sort((a,b)=>a.days-b.days)[0];
    const expiryText = soonest ? `${soonest.name} (${soonest.days}d)` : '—';
    const expiryColor = soonest && soonest.days <= 30 ? 'var(--red)' : soonest && soonest.days <= 60 ? 'var(--amber)' : 'var(--green)';
    return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
      ${[
        ['Total Weekly Rent', '$'+totalWeekly.toLocaleString()+'/wk', 'var(--green)'],
        ['Annual Income', '$'+annual.toLocaleString(), 'var(--text)'],
        ['Occupancy', occupied+'/'+occupied+' tenanted', 'var(--accent)'],
        ['Next Expiry', expiryText, expiryColor],
      ].map(([label,val,color])=>`<div style="background:#FFFFFF;border:1px solid #EDF1F7;border-radius:14px;padding:16px"><div style="font-size:11px;color:#8F9BB3;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">${label}</div><div style="font-size:18px;font-weight:700;color:${color}">${val}</div></div>`).join('')}
    </div>`;
  }

  // ── Render ──
  function render() {
    renderStats();
    renderLeaseBanner();
    const main = document.getElementById('main');
    if (currentView === 'kanban') {
      main.innerHTML = renderKanban();
    } else {
      main.innerHTML = renderFinancialSummary() + renderPropertyView();
    }
    bindCardClicks();
    bindGroupToggles();
    bindPropertyExpand();
  }

  // ── Detail Panel ──
  function openDetail(msgId) {
    const item = items.find(i => i.msgId === msgId);
    if (!item) return;
    openPanelId = msgId;
    const p = PROPERTY_MAP[item.propertyId] || { name: item.property, address: '' };
    const st = resolveStatus(item);
    const tc = typeClass(item.type);
    const urgency = item.data && item.data.urgency ? item.data.urgency : '';
    const urgCls = urgency ? ` badge-urgency-${urgency.toLowerCase()}` : '';
    const bodyText = item.data && item.data.bodyText ? item.data.bodyText : '(No body text)';

    let html = '';
    if (item.needsReview) {
      html += `<div class="detail-review-banner">⚠ Flagged for review — classifier may have misidentified this</div>`;
    }
    html += `<div class="detail-property">${esc(p.name)}</div>`;
    html += `<div class="detail-address">${esc(p.address)}</div>`;
    html += `<div class="detail-badges">
      <span class="badge badge-${tc}">${esc(item.type)}</span>
      ${urgency ? `<span class="badge${urgCls}">${esc(urgency)}</span>` : ''}
    </div>`;
    html += `<div class="detail-subject">${esc(item.subject)}</div>`;
    html += `<div class="detail-row"><strong>From:</strong> ${esc(item.from)}</div>`;
    html += `<div class="detail-row"><strong>Date:</strong> ${esc(formatDate(item.emailDate))}</div>`;
    html += `<div class="detail-row"><strong>PM:</strong> ${esc(item.pm)}</div>`;
    if (item.period) {
      html += `<div class="detail-row"><strong>Period:</strong> ${esc(item.period)}</div>`;
    }
    html += `<div class="detail-row" style="margin-top:4px"><strong>Status:</strong> ${esc(st)}</div>`;
    html += `<div class="detail-body">${esc(bodyText)}</div>`;

    if (item.attachments && item.attachments.length > 0) {
      html += `<div class="detail-attachments">
        <div class="detail-att-title">Attachments (${item.attachments.length})</div>`;
      item.attachments.forEach(a => {
        const name = typeof a === 'string' ? a : (a.filename || a.name || 'attachment');
        html += `<div class="detail-att-item">📎 ${esc(name)}</div>`;
      });
      html += `</div>`;
    }

    document.getElementById('detail-content').innerHTML = html;

    // Actions
    document.getElementById('detail-actions').innerHTML = `
      <button class="action-btn action-btn-nfa" data-action="NFA">NFA</button>
      <button class="action-btn action-btn-progress" data-action="IN_PROGRESS">In Progress</button>
      <button class="action-btn action-btn-done" data-action="DONE">Done</button>
    `;

    document.getElementById('backdrop').classList.add('open');
    document.getElementById('detail-panel').classList.add('open');

    // Bind action buttons
    document.getElementById('detail-actions').querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', async function() {
        const action = this.getAttribute('data-action');
        await setStatus(msgId, action);
        closeDetail();
        render();
      });
    });
  }

  function closeDetail() {
    openPanelId = null;
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('detail-panel').classList.remove('open');
  }

  // ── Event Binding ──
  function bindCardClicks() {
    document.querySelectorAll('.card[data-id]').forEach(card => {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.group-toggle')) return;
        openDetail(this.getAttribute('data-id'));
      });
    });
    // Mobile tab switching
    document.querySelectorAll('.mobile-tab[data-col]').forEach(tab => {
      tab.addEventListener('click', function() {
        window._mobileActiveCol = this.getAttribute('data-col');
        document.getElementById('main').innerHTML = renderKanban();
        bindCardClicks(); bindGroupToggles(); bindPropertyExpand();
      });
    });
  }

  function bindGroupToggles() {
    document.querySelectorAll('.group-toggle').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const gid = this.getAttribute('data-group');
        expandedGroups[gid] = !expandedGroups[gid];
        render();
      });
    });
  }

  function bindPropertyExpand() {
    document.querySelectorAll('[data-expand-prop]').forEach(card => {
      card.addEventListener('click', function() {
        expandedProperties[this.getAttribute('data-expand-prop')] = true;
        render();
      });
    });
    document.querySelectorAll('[data-collapse-prop]').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        expandedProperties[this.getAttribute('data-collapse-prop')] = false;
        render();
      });
    });
  }

  // ── View Toggle ──
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentView = this.getAttribute('data-view');
      expandedProperties = {};
      render();
    });
  });

  // ── Filter Chips ──
  document.querySelectorAll('.chip[data-filter-type]').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.chip[data-filter-type]').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      filterType = this.getAttribute('data-filter-type');
      render();
    });
  });
  document.querySelectorAll('.chip[data-filter-prop]').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.chip[data-filter-prop]').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      filterProp = this.getAttribute('data-filter-prop');
      render();
    });
  });

  // ── Backdrop / Escape ──
  document.getElementById('backdrop').addEventListener('click', closeDetail);
  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDetail();
  });

  // ── Fetch Leases ──
  async function fetchLeases() {
    try {
      const res = await fetch(LEASES_URL + '?_=' + Date.now());
      if (res.ok) {
        leases = await res.json();
      }
    } catch (e) {
      console.warn('Leases data unavailable, degrading gracefully:', e.message);
    }
  }

  // ── Fetch Data ──
  async function loadData() {
    try {
      // Load queue data + persisted statuses + leases in parallel
      const [queueRes] = await Promise.all([
        fetch(DATA_URL + '?_=' + Date.now()),
        fetchStatusMap(),
        fetchLeases()
      ]);
      if (!queueRes.ok) throw new Error('HTTP ' + queueRes.status);
      const data = await queueRes.json();
      items = Array.isArray(data) ? data : (data.items || data.queue || []);
      // Sort newest first
      items.sort((a, b) => new Date(b.emailDate || b.scannedAt) - new Date(a.emailDate || a.scannedAt));
      render();
    } catch (err) {
      document.getElementById('main').innerHTML =
        `<div class="loading" style="color:var(--red)">Failed to load data: ${esc(err.message)}</div>`;
    }
  }

  loadData();

  // ── Refresh button ──
