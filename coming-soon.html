<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — Pencev Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F4F5F7; --surface: #FFFFFF; --surface-2: #F4F6F9;
  --border: #E8ECF2; --border-hover: #C8D2E2;
  --text: #0A1327; --text-muted: #8F9BB3; --text-dim: #C4CDDF;
  --header-h: 64px;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.monogram {
  width: 38px; height: 38px; border-radius: 50%; background: #0A1327;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff; letter-spacing: -0.5px;
}
.header-title { font-size: 15px; font-weight: 700; color: #0A1327; letter-spacing: -0.3px; }
.header-subtitle { font-size: 11px; color: #8F9BB3; font-weight: 500; }
.header-nav { display: flex; align-items: center; gap: 4px; }
.nav-link { font-size: 13px; font-weight: 500; color: var(--text-muted); text-decoration: none; padding: 6px 12px; border-radius: 8px; transition: all 150ms; }
.nav-link:hover { color: var(--text); background: var(--surface); }

.main {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding-top: var(--header-h);
}
.center-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 56px 48px; text-align: center;
  max-width: 440px; width: 100%;
}
.cs-icon { font-size: 48px; margin-bottom: 20px; }
.cs-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  background: var(--surface-2); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px; margin-bottom: 16px;
}
.cs-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 10px; }
.cs-sub { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 32px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--text);
  text-decoration: none; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 18px; transition: all 150ms;
}
.back-link:hover { border-color: var(--border-hover); background: #edf1f7; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="monogram">MP</div>
    <div>
      <div class="header-title">Pencev Hub</div>
      <div class="header-subtitle">Pencev Capital Pty Ltd</div>
    </div>
  </div>
  <nav class="header-nav">
    <a href="hub.html" class="nav-link">Hub</a>
    <a href="index.html" class="nav-link">Properties</a>
    <a href="wealth.html" class="nav-link">Wealth</a>
    <a href="https://master.tank-command-center.pages.dev" class="nav-link" target="_blank">Tank</a>
  </nav>
</header>

<main class="main">
  <div class="center-card">
    <div class="cs-icon">🚧</div>
    <div class="cs-badge">Coming soon</div>
    <div class="cs-title" id="module-name">Module</div>
    <div class="cs-sub">This module is on the roadmap. Spectre is building it — check back soon.</div>
    <a href="hub.html" class="back-link">← Back to Hub</a>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const mod = params.get('module');
if (mod) {
  document.getElementById('module-name').textContent = mod;
  document.title = mod + ' — Coming Soon · Pencev Hub';
}
</script>

</body>
</html>
